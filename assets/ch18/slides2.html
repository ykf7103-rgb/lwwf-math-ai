<script>
const PREFIX = 'slides2', TOTAL = 15, CHAPTER = 18, DECK_KEY = 'slides2';
// 🚨 v6 SLIDE_QUESTIONS — OCR 對齊 NLM JPG
// Ch18 Part 2: 摺紙圖樣（Net）摺立體 — 寶可夢 Pokemon 諾言主角
// 結構：p1 標題 / p2-4 教學（net 概念）/ p5,7,9,11,13 Q頁 / p15 總結 + voice
const SLIDE_QUESTIONS = [
  // p5 諾言把摺紙圖樣摺成正方體 — 求邊長（圖樣寬 8 cm 高 6 cm）
  { afterPage:5, type:'mc', q:'諾言把這個摺紙圖樣（T 字形 6 cm × 8 cm）摺成一個正方體。請問正方體的邊長是多少 cm？',
    options:['1 cm','2 cm','4 cm','8 cm'], correct:1,
    hint:'圖樣寬 8 cm 由 4 個正方形組成 → 每邊 = 8 ÷ 4 = 2 cm（高 6 cm 由 3 個 = 2 cm，互相一致）。' },
  { afterPage:5, type:'mc', q:'分析：這個摺紙圖樣有多少個小正方形組成？',
    options:['4 個','5 個','6 個','7 個'], correct:2,
    hint:'正方體有 6 個面，所以摺紙圖樣由 6 個相同大小的正方形組成。' },

  // p7 乘勝追擊：邊長 = 2 cm，求正方體體積
  { afterPage:7, type:'fill', q:'已知正方體的邊長是 2 cm，那麼正方體的體積是多少 cm³？',
    accept:['8','8 cm³','8cm³'],
    hint:'V = 邊 × 邊 × 邊 = 2 × 2 × 2 = 8 cm³。' },
  { afterPage:7, type:'mc', q:'正方體體積公式為何寫作「邊 × 邊 × 邊」？',
    options:['因為正方體有 3 條邊','因為正方體的長、闊、高都相等','因為要乘 3 次才得到體積','因為公式約定俗成'], correct:1,
    hint:'正方體的特性：長、闊、高都相同（皆等於邊長）→ 體積 = 邊 × 邊 × 邊。' },

  // p9 進階挑戰：長方體展開圖（2 cm × 2 cm × 14 cm）
  { afterPage:9, type:'mc', q:'進階挑戰：這個摺紙圖樣可以摺出什麼立體圖形？',
    options:['正方體','長方體（長 14 cm、闊 2 cm、高 2 cm）','三角柱','圓柱'], correct:1,
    hint:'圖樣有兩個 2×2 cm 小正方形（兩端面）+ 4 個長矩形（側面）→ 摺成長方體。' },
  { afterPage:9, type:'fill', q:'這個長方體盒子（長 14 cm、闊 2 cm、高 2 cm）的體積是多少 cm³？',
    accept:['56','56 cm³','56cm³'],
    hint:'V = 長 × 闊 × 高 = 14 × 2 × 2 = 56 cm³。' },

  // p11 關鍵時刻：長方體體積結算
  { afterPage:11, type:'mc', q:'關鍵時刻：再次驗算 — 長方體（長 14 cm、闊 2 cm、高 2 cm）的體積等於：',
    options:['28 cm³','42 cm³','56 cm³','112 cm³'], correct:2,
    hint:'14 × 2 × 2 = 56 cm³。注意 cm³ 是立方厘米，不是平方厘米。' },
  { afterPage:11, type:'mc', q:'若把長方體（長 14、闊 2、高 2 cm）內裝入邊長 2 cm 的小正方體，最多可放多少粒？',
    options:['4 粒','5 粒','7 粒','14 粒'], correct:2,
    hint:'長邊 14÷2 = 7 粒；闊邊 2÷2 = 1 粒；高邊 2÷2 = 1 粒；7 × 1 × 1 = 7 粒。' },

  // p13 終極防衛戰：空間的容納極限（不可大除以小）
  { afterPage:13, type:'mc', q:'終極防衛戰：在長方體盒（長 14、闊 2、高 2 cm）內，最多可放多少個邊長 2 cm 的正方體？必須一邊一邊計算！',
    options:['7 個','14 個（直接 56 ÷ 8）','28 個','56 個'], correct:0,
    hint:'錯誤方法：56 ÷ 8 = 7 看似巧合得對，但容器形狀不允許！正確：每哪一個數相乘 = 7 × 1 × 1 = 7 個。' },
  { afterPage:13, type:'mc', q:'為什麼不可以直接「大體積 ÷ 小體積」？',
    options:['因為容器有可能放不滿（形狀不匹配）','因為公式錯了','因為單位不同','因為一定要除整數'], correct:0,
    hint:'例如盒 14×2×2 = 56 cm³，小正方體 8 cm³，56÷8 = 7。但若盒是 14×3×2 = 84 cm³，84÷8 = 10.5 但實際只能放 7×1×1 = 7 粒！' },

  // p15 🎤 Voice question (Feynman 教學法)
  { afterPage:15, type:'voice',
    q:'🎤 諾言挑戰：用 Feynman 方法，教同學如何計算摺紙圖樣（6 個正方形組成，寬 8 cm）摺成正方體後的體積。講 20-30 秒。',
    concept:'摺紙圖樣摺成立體：先求邊長，再用 邊×邊×邊 求體積',
    rubric:'講出：邊長 = 8÷4 = 2 cm、體積 = 2×2×2 = 8 cm³',
    hint:'講到答案 8 cm³ + 任何一個原理就達標！例如「圖樣闊 8 cm 由 4 個正方形組成，所以邊長 = 8÷4 = 2 cm，體積 = 2×2×2 = 8 cm³」就達標（~80 分）。再加上「正方體有 6 個面所以圖樣有 6 個正方形」會得到更高分 💪' }
];
let idx = 0;
const slideQuizAnswered = {}, slideQuizWrong = {};
const img=document.getElementById('slide'),ind=document.getElementById('ind'),prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),pfill=document.getElementById('pfill'),doneBanner=document.getElementById('done'),thumbsEl=document.getElementById('thumbs'),quizOv=document.getElementById('quizOv'),quizBody=document.getElementById('quizBody'),wrongNote=document.getElementById('wrongNote'),lockModal=document.getElementById('lockModal');
function pad(n){return String(n).padStart(2,'0');}
function getUnansweredQ(pageNum){const qs=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum);for(let i=0;i<qs.length;i++){const key=pageNum+'_'+i;if(!slideQuizAnswered[key])return{q:qs[i],key,idx:i,pageNum};}return null;}
function buildThumbs(){thumbsEl.innerHTML='';for(let i=0;i<TOTAL;i++){const t=document.createElement('div');t.className='thumb';t.style.backgroundImage=`url('pages/${PREFIX}_p${pad(i+1)}.jpg')`;t.onclick=()=>goto(i);const num=document.createElement('div');num.className='thumb-num';num.textContent=i+1;t.appendChild(num);thumbsEl.appendChild(t);}}
function render(){img.src=`pages/${PREFIX}_p${pad(idx+1)}.jpg`;img.alt=`第 ${idx+1} 頁`;ind.textContent=`${idx+1} / ${TOTAL}`;prevBtn.disabled=idx===0;nextBtn.textContent=idx===TOTAL-1?'完成 ✓':'下一頁 ▶';pfill.style.width=Math.round((idx+1)/TOTAL*100)+'%';[...thumbsEl.children].forEach((el,i)=>{el.classList.toggle('active',i===idx);const pg=i+1;const hasQ=SLIDE_QUESTIONS.some(q=>q.afterPage===pg);const allAnswered=hasQ&&!getUnansweredQ(pg);el.classList.toggle('answered',allAnswered);});const active=thumbsEl.querySelector('.thumb.active');if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});quizOv.classList.remove('show');if(idx===TOTAL-1){const allDone=!SLIDE_QUESTIONS.some((q,i)=>!slideQuizAnswered[q.afterPage+'_'+SLIDE_QUESTIONS.filter(x=>x.afterPage===q.afterPage).indexOf(q)]);if(allDone){doneBanner.classList.add('show');markDone();}}}
function showQuiz(pageNum){const pageQs=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum);let html='';pageQs.forEach((pq,i)=>{const key=pageNum+'_'+i;const done=slideQuizAnswered[key];const type=pq.type||'mc';const badge=type==='fill'?'<span class="type-badge fill">填充題</span>':type==='voice'?'<span class="type-badge" style="background:#E91E63;">🎤 解釋題</span>':'<span class="type-badge mc">選擇題</span>';html+=`<div id="qb${i}" class="quiz-block${done?' done':''}">`;html+=`<div class="q-label">${done?'✅ ':''}第${i+1}題${badge}<br>${pq.q}</div>`;if(done){html+=`<div class="hint-msg correct">✅ 已答對</div>`;}else if(type==='voice'){html+=`<div style="background:#FCE4EC;padding:10px;border-radius:8px;margin-bottom:8px;font-size:0.85rem;color:#880E4F;">💡 ${pq.hint||'用自己的話解釋。'}</div><textarea id="vt${i}" placeholder="✏️ 用你的話解釋（最少 20 字）..." style="width:100%;min-height:80px;padding:10px;border:2px solid #E91E63;border-radius:8px;font-size:0.95rem;font-family:inherit;outline:none;resize:vertical;"></textarea><button class="fill-btn" style="background:linear-gradient(135deg,#E91E63,#AD1457);margin-top:6px;" onclick="checkVoice(${i},${pageNum})">🤖 提交給 AI 評分</button><div class="hint-msg" id="hm${i}"></div>`;}else if(type==='fill'){html+=`<div class="fill-box"><input type="text" class="fill-input" id="fi${i}" placeholder="輸入答案..."><button class="fill-btn" onclick="checkFill(${i},${pageNum})">提交</button></div>`;html+=`<div class="hint-msg" id="hm${i}"></div>`;}else{html+=`<div class="mc-opts">`;pq.options.forEach((opt,oi)=>{html+=`<button class="mc-opt" data-i="${oi}" onclick="checkMC(${i},${oi},${pageNum})">${['A','B','C','D'][oi]}. ${opt}</button>`;});html+=`</div><div class="hint-msg" id="hm${i}"></div>`;}html+=`</div>`;});quizBody.innerHTML=html;const wrongs=slideQuizWrong[pageNum]||0;wrongNote.textContent=wrongs>0?`⚠️ 這一頁已錯 ${wrongs} 次（錯 2 次要從頭看起）`:'';quizOv.classList.add('show');setTimeout(()=>{const firstInput=quizBody.querySelector('.fill-input:not([disabled])');if(firstInput)firstInput.focus();},100);quizBody.querySelectorAll('.fill-input').forEach(inp=>{inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const i=inp.id.slice(2);checkFill(parseInt(i),pageNum);}});});}
function checkMC(qIdx,selected,pageNum){const q=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum)[qIdx];const key=pageNum+'_'+qIdx;const block=document.getElementById('qb'+qIdx);const hint=document.getElementById('hm'+qIdx);const btns=block.querySelectorAll('.mc-opt');if(selected===q.correct){btns[selected].classList.add('correct');btns.forEach(b=>b.disabled=true);slideQuizAnswered[key]=true;block.classList.add('done');hint.className='hint-msg correct';hint.innerHTML='✅ 答對！';autoAdvance(pageNum);}else{btns[selected].classList.add('wrong');btns[selected].disabled=true;hint.className='hint-msg wrong';hint.innerHTML=`❌ 再試！💡 ${q.hint}`;registerWrong(pageNum);}}
function checkFill(qIdx,pageNum){const q=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum)[qIdx];const key=pageNum+'_'+qIdx;const input=document.getElementById('fi'+qIdx);const hint=document.getElementById('hm'+qIdx);const block=document.getElementById('qb'+qIdx);const val=input.value.trim();if(!val){input.focus();return;}const normalize=s=>String(s).trim().replace(/\s+/g,'').replace(/，/g,',');const userAns=normalize(val);const correct=(q.accept||[]).some(a=>normalize(a)===userAns);if(correct){input.classList.add('correct');input.disabled=true;slideQuizAnswered[key]=true;block.classList.add('done');hint.className='hint-msg correct';hint.innerHTML='✅ 答對！';autoAdvance(pageNum);}else{input.classList.remove('wrong');void input.offsetWidth;input.classList.add('wrong');hint.className='hint-msg wrong';hint.innerHTML=`❌ 再試！💡 ${q.hint}`;registerWrong(pageNum);setTimeout(()=>input.classList.remove('wrong'),500);}}
function registerWrong(pageNum){slideQuizWrong[pageNum]=(slideQuizWrong[pageNum]||0)+1;wrongNote.textContent=`⚠️ 這一頁已錯 ${slideQuizWrong[pageNum]} 次（錯 2 次要從頭看起）`;if(slideQuizWrong[pageNum]>=2){setTimeout(triggerLock,600);}}

async function checkVoice(qIdx,pageNum){const q=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum)[qIdx];const key=pageNum+'_'+qIdx;const ta=document.getElementById('vt'+qIdx);const hint=document.getElementById('hm'+qIdx);const block=document.getElementById('qb'+qIdx);const text=(ta.value||'').trim();if(text.length<20){hint.className='hint-msg wrong';hint.innerHTML='⚠️ 至少寫 20 字（試吓多寫幾句解釋）';return;}hint.className='hint-msg';hint.style.cssText='background:#FFF3E0;color:#E65100;padding:8px;border-radius:6px;display:block;';hint.innerHTML='🤖 AI 評分中...';const prompt=`學生用打字代替錄音回答。題目：${q.q}\n核心概念：${q.concept||''}\n評分要點：${q.rubric||''}\n學生答案：${text}\n\n評分：講到答案+1原理→78-88；只有答案→50-65；答案錯→20-40；沒有關事→0-20。\n返回 JSON: {"score":N,"feedback":"鼓勵式 1-2 句"}`;try{const res=await fetch('https://lwwf-math-ai.lwwfaiteams.workers.dev/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});const data=await res.json();let parsed;try{parsed=JSON.parse(data.reply);}catch{parsed={score:70,feedback:data.reply||'已收到答案 ✓'};}const passed=parsed.score>=60;hint.className='hint-msg '+(passed?'correct':'wrong');hint.style.cssText='';hint.innerHTML=`${passed?'✅':'⚠️'} AI 得分：<b>${parsed.score}/100</b><br>${parsed.feedback}`;if(passed){slideQuizAnswered[key]=true;block.classList.add('done');ta.disabled=true;try{const k=(()=>{try{const u=JSON.parse(localStorage.getItem("lwwf_auth_user")||"null");if(u&&u.class&&u.number)return`progress_ch${CHAPTER}_${u.class}_${u.number}`;}catch(e){}return`progress_ch${CHAPTER}`;})();const p=JSON.parse(localStorage.getItem(k)||'{}');const oldVoice=(p[DECK_KEY]&&p[DECK_KEY].voice)||{};p[DECK_KEY]=Object.assign(p[DECK_KEY]||{},{done:true,ts:Date.now(),voice:Object.assign(oldVoice,{score:parsed.score,text:text.slice(0,200)})});localStorage.setItem(k,JSON.stringify(p));}catch(e){}autoAdvance(pageNum);}else{registerWrong(pageNum);}}catch(e){hint.className='hint-msg wrong';hint.style.cssText='';hint.innerHTML='❌ AI 評分失敗，再試？('+(e.message||'')+')';}}

function triggerLock(){lockModal.classList.add('show');}
function goBackToStart(){Object.keys(slideQuizAnswered).forEach(k=>delete slideQuizAnswered[k]);Object.keys(slideQuizWrong).forEach(k=>delete slideQuizWrong[k]);lockModal.classList.remove('show');idx=0;render();window.scrollTo({top:0,behavior:'smooth'});}
function autoAdvance(pageNum){setTimeout(()=>{const uq=getUnansweredQ(pageNum);if(!uq){setTimeout(()=>{quizOv.classList.remove('show');if(idx<TOTAL-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});setTimeout(()=>{const newQ=getUnansweredQ(idx+1);if(newQ)showQuiz(idx+1);},400);}else{doneBanner.classList.add('show');markDone();}},700);}},250);}
// 2026-05-05 fix: 翻頁防誤觸 + preload
let __navLock = false;
function __navUnlock(){ __navLock = false; }
function __preloadAdjacent(){
  const fmt = (n) => String(n).padStart(2, '0');
  for (const offset of [1, -1, 2]) {
    const target = idx + offset + 1;
    if (target < 1 || target > TOTAL) continue;
    const pre = new Image();
    pre.src = `pages/${PREFIX}_p${fmt(target)}.jpg`;
  }
}

function next(){
  if (__navLock) return;
  __navLock = true;
  setTimeout(__navUnlock, 600);const pageNum=idx+1;const uq=getUnansweredQ(pageNum);if(uq){showQuiz(pageNum);return;}if(idx<TOTAL-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});}else{doneBanner.classList.add('show');markDone();}}
function prev(){if(idx>0){idx--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goto(i){if(i>idx){for(let p=idx+1;p<=i;p++){const uq=getUnansweredQ(p);if(uq){idx=p-1;render();setTimeout(()=>showQuiz(p),300);return;}}}idx=Math.max(0,Math.min(TOTAL-1,i));render();}
function markDone(){try{const key=(()=>{try{const u=JSON.parse(localStorage.getItem("lwwf_auth_user")||"null");if(u&&u.class&&u.number)return`progress_ch${CHAPTER}_${u.class}_${u.number}`;}catch(e){}return`progress_ch${CHAPTER}`;})();const p=JSON.parse(localStorage.getItem(key)||'{}');p[DECK_KEY]={done:true,ts:Date.now()};localStorage.setItem(key,JSON.stringify(p));}catch(e){}}
document.addEventListener('keydown',e=>{if(lockModal.classList.contains('show'))return;if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}else if(e.key==='ArrowLeft'){e.preventDefault();prev();}});
let touchX=0,touchY=0;
document.querySelector('.viewer').addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX;touchY=e.changedTouches[0].screenY;},{passive:true});
document.querySelector('.viewer').addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-touchX,dy=e.changedTouches[0].screenY-touchY;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0)next();else prev();}},{passive:true});
buildThumbs();render();

// 2026-05-02 v2 fix: aggressive all-preload + visible loading overlay
(function __preloadAllOnInit_v2(){
  if (typeof TOTAL === 'undefined' || typeof PREFIX === 'undefined') return;
  const fmt = (n) => String(n).padStart(2, '0');
  for (let i = 1; i <= TOTAL; i++) {
    const pre = new Image();
    pre.src = `pages/${PREFIX}_p${fmt(i)}.jpg`;
  }
})();

(function __wireImageLoadingState_v2(){
  const viewer = document.querySelector('.viewer');
  const slideImg = document.getElementById('slide');
  if (!viewer || !slideImg) return;
  let __loadTimer;
  const showLoad = () => {
    clearTimeout(__loadTimer);
    __loadTimer = setTimeout(() => viewer.classList.add('img-loading'), 100);
  };
  const hideLoad = () => {
    clearTimeout(__loadTimer);
    viewer.classList.remove('img-loading');
  };
  slideImg.addEventListener('loadstart', showLoad);
  slideImg.addEventListener('load',      hideLoad);
  slideImg.addEventListener('error',     hideLoad);
  // Edge case: src already set when this code runs
  if (slideImg.complete && slideImg.naturalWidth > 0) hideLoad(); else showLoad();
})();
