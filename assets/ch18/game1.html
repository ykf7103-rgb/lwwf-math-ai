<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>第18課 · 遊戲 1 — 寶可夢立體大冒險</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;background:#000}
body{
  background:linear-gradient(135deg,#FFE082 0%,#FFB300 50%,#FB8C00 100%);
  color:#2a1400;min-height:100vh;display:flex;flex-direction:column;
}

.character{position:fixed;bottom:14px;right:14px;width:min(110px,16vw);z-index:50;pointer-events:none;
  filter:drop-shadow(2px 4px 6px rgba(0,0,0,0.4))}

.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px;text-align:center;overflow-y:auto}
.screen.active{display:flex}

#startScreen{justify-content:center}
#startScreen h1{font-family:'Noto Serif TC',serif;font-size:clamp(26px,6vw,52px);color:#B71C1C;
  text-shadow:0 0 25px rgba(255,255,255,0.7);margin-bottom:6px;font-weight:900;line-height:1.2}
#startScreen h2{font-size:clamp(15px,3vw,22px);color:#5D4037;margin-bottom:18px}
#startScreen .heroes{display:flex;gap:8px;justify-content:center;align-items:flex-end;margin:14px 0;flex-wrap:wrap}
#startScreen .heroes img{width:min(110px,22vw);height:auto;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.4));animation:bob 3s ease-in-out infinite}
#startScreen .heroes img:nth-child(2){animation-delay:.3s}
#startScreen .heroes img:nth-child(3){animation-delay:.6s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#startScreen .intro{
  max-width:480px;font-size:clamp(13px,2.5vw,15px);line-height:1.7;color:#fff;
  background:rgba(33,33,33,0.85);padding:14px 18px;border-radius:14px;
  border:2px solid #FFD700;margin-bottom:16px;
}
.btn-start{font-size:clamp(17px,3.5vw,22px);padding:13px 32px;font-weight:700;
  background:linear-gradient(135deg,#E53935,#B71C1C);color:#fff;
  border:none;border-radius:28px;cursor:pointer;
  box-shadow:0 6px 18px rgba(229,57,53,0.5);transition:all 0.2s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(229,57,53,0.7)}

#gameScreen{padding:8px;justify-content:flex-start}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;
  max-width:680px;background:rgba(33,33,33,0.85);padding:10px 14px;border-radius:14px;
  border:2px solid #FFD700;margin-bottom:10px;font-weight:700;flex-wrap:wrap;gap:8px;color:#fff}
.hud .item{display:flex;flex-direction:column;align-items:center;font-size:11px;color:#FFD700}
.hud .v{font-size:18px;color:#fff;font-weight:900;line-height:1}

/* Map progress (gym badges) */
.map-strip{display:flex;justify-content:center;gap:4px;width:100%;max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.map-strip .island{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:2px solid rgba(33,33,33,0.4)}
.map-strip .island.done{background:linear-gradient(135deg,#43A047,#1B5E20);border-color:#1B5E20;color:#fff}
.map-strip .island.current{background:linear-gradient(135deg,#E53935,#B71C1C);border-color:#fff;color:#fff;
  animation:badgePulse 1.2s infinite;box-shadow:0 0 12px #E53935}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.map-strip .island.locked{opacity:0.5}
.map-strip .wave{color:#5D4037;font-size:14px;align-self:center}

/* Pokeball / battle scene */
.treasure-scene{position:relative;width:100%;max-width:680px;
  background:linear-gradient(135deg,rgba(33,33,33,0.85),rgba(63,81,181,0.85));
  border:2px solid #FFD700;border-radius:18px;padding:16px;margin-bottom:10px;
  min-height:140px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.4);color:#fff}
.treasure-scene .chest{width:min(150px,30vw);height:auto;margin:8px auto 0;display:block;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));animation:pokeShake 2s ease-in-out infinite}
@keyframes pokeShake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
.island-name{font-size:clamp(14px,2.8vw,18px);color:#FFD700;font-weight:900;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;justify-content:center}
.island-name .icon{font-size:24px}
.q-text{font-size:clamp(15px,3.3vw,20px);font-weight:900;color:#fff;margin:8px 0 4px;
  background:rgba(0,0,0,0.55);padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.5);line-height:1.5}
.formula-hint{font-size:13px;color:#FFD54F;font-style:italic;margin-top:6px}

/* Answer input */
.ans-row{display:flex;gap:8px;justify-content:center;align-items:center;width:100%;
  max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.ans-input{flex:1;min-width:160px;padding:14px 16px;background:rgba(255,255,255,0.95);color:#2a1400;
  border:3px solid #E53935;border-radius:12px;font-size:1.3rem;font-weight:900;text-align:center;font-family:inherit}
.ans-input:focus{outline:none;border-color:#B71C1C;background:#FFF8E1}
.ans-input.correct{background:#C8E6C9;border-color:#2E7D32;color:#1B5E20}
.ans-input.wrong{background:#FFCDD2;border-color:#C62828;color:#B71C1C;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ans-unit{font-size:1rem;color:#FFD700;font-weight:900;padding:0 4px}
.ans-submit{padding:14px 22px;background:linear-gradient(135deg,#E53935,#B71C1C);color:#fff;
  border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:1rem}
.ans-submit:hover{transform:translateY(-2px)}

.feedback{display:none;font-size:14px;line-height:1.55;background:rgba(33,33,33,0.85);
  padding:12px 14px;border-radius:10px;border:1px solid rgba(255,215,0,0.5);color:#FFD54F;
  margin-bottom:10px;width:100%;max-width:680px;text-align:left}
.feedback.show{display:block;animation:fadeIn .4s}
.feedback.right{background:rgba(76,175,80,0.85);border-color:#43A047;color:#fff}
.feedback.wrong{background:rgba(244,67,54,0.85);border-color:#C62828;color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.next-btn{display:none;font-size:16px;padding:11px 26px;font-weight:700;
  background:linear-gradient(135deg,#43A047,#2E7D32);color:white;border:none;
  border-radius:24px;cursor:pointer;box-shadow:0 4px 12px rgba(67,160,71,0.5)}
.next-btn.show{display:inline-block;animation:popIn 0.4s}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* End screen */
#endScreen{justify-content:flex-start;padding-top:14px}
.end-title{font-family:'Noto Serif TC',serif;font-size:clamp(28px,6vw,44px);color:#B71C1C;
  text-shadow:0 0 20px rgba(255,255,255,0.7);margin-bottom:10px;font-weight:900}
.end-character{width:min(170px,40vw);margin:10px 0;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.4))}
.coins-row{display:flex;justify-content:center;gap:14px;margin:14px 0}
.coins-row .coin-img{width:50px;height:50px;filter:drop-shadow(0 0 12px gold);
  animation:coinFlip 1s ease-out;opacity:0}
.coins-row .coin-img.show{opacity:1}
.coins-row .coin-img.bw{filter:grayscale(1) opacity(0.35)}
@keyframes coinFlip{0%{transform:rotateY(0deg) scale(0.3)}100%{transform:rotateY(720deg) scale(1)}}
.stats-info{font-size:15px;line-height:1.8;background:rgba(33,33,33,0.85);padding:14px 18px;
  border-radius:12px;border:1px solid #FFD700;margin-bottom:14px;color:#fff}
.stats-info b{color:#FFD700}
.end-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

.back-link{position:absolute;top:8px;left:8px;background:rgba(33,33,33,0.85);
  color:#FFD700;padding:5px 12px;border-radius:8px;font-size:13px;text-decoration:none;
  border:1px solid rgba(255,215,0,0.5);z-index:100}
</style>
</head>
<body>

<a href="index.html" class="back-link">← 返回</a>

<!-- ===== START SCREEN ===== -->
<div id="startScreen" class="screen active">
  <h1>⚡ 寶可夢立體大冒險</h1>
  <h2>不規則立體 · 分割法 + 填補法</h2>
  <div class="heroes">
    <img src="images/pikachu.png" alt="皮卡丘">
    <img src="images/pikachu.png" alt="皮卡丘">
    <img src="images/pikachu.png" alt="皮卡丘">
  </div>
  <div class="intro">
    ⚡ 你是小智！跟皮卡丘一起征服 <b>10 個道館</b>，
    每個道館都有一個不規則立體要計算體積。請使用<b>分割法</b>或<b>填補法</b>解難！
    <br><br>
    📐 分割法：將不規則立體切成幾個簡單長方體，分別計算後加總。<br>
    📐 填補法：先補成完整長方體，減去虛擬補上去的部分。
    <br>
    🪙 全程零失誤可賺 3 金幣！
  </div>
  <button class="btn-start" onclick="startGame()">出發冒險 ⚡</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <div class="item"><span>道館</span><span class="v" id="progressTxt">1 / 10</span></div>
    <div class="item"><span>得分</span><span class="v" id="scoreTxt">0</span></div>
    <div class="item"><span>失誤</span><span class="v" id="wrongsTxt">0 / 5</span></div>
  </div>
  <div class="map-strip" id="mapStrip"></div>
  <div class="treasure-scene">
    <div class="island-name">
      <span class="icon" id="islandIcon">🏟️</span>
      <span id="islandName">第 1 道館 · 新手村</span>
    </div>
    <img class="chest" id="chestImg" src="images/pikachu.png" alt="皮卡丘">
    <div class="q-text" id="qText">準備中...</div>
    <div class="formula-hint" id="formulaHint"></div>
  </div>
  <div class="ans-row">
    <input type="number" id="ansInput" class="ans-input" placeholder="輸入體積..." inputmode="numeric" autocomplete="off">
    <span class="ans-unit" id="ansUnit">cm³</span>
    <button class="ans-submit" onclick="checkAnswer()">⚡ 提交</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextRoom()">下一道館 ➜</button>
</div>

<!-- ===== END SCREEN ===== -->
<div id="endScreen" class="screen">
  <div class="end-title" id="endTitle">🏆 道館徽章到手！</div>
  <img id="endChar" src="images/pikachu.png" class="end-character" alt="勝利">
  <div class="coins-row">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin1">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin2">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin3">
  </div>
  <div class="stats-info" id="statsInfo"></div>
  <div class="end-buttons">
    <button class="btn-start" onclick="restartGame()">再玩一次 🔄</button>
    <a href="index.html" class="btn-start" style="text-decoration:none;display:inline-block;background:linear-gradient(135deg,#1565C0,#0D47A1);color:white">🏠 返回第18課</a>
  </div>
</div>

<!-- Wrong tracker -->
<script src="../common/wrong-tracker.js"></script>

<script>
// ============================================================
// 10 道館 — 第18課 LO: 不規則立體分割法 + 填補法（書面語）
// ============================================================
const ISLANDS = [
  { icon:'🏟️', name:'新手道館', type:'split',
    q:'小智遇到一個 L 型岩石：上方為 1 個邊長 8 cm 的正方體，下方為長 16 cm、闊 8 cm、高 8 cm 的長方體。請使用分割法計算總體積。',
    formula:'上方 8³ + 下方 16×8×8 = 512 + 1024', answer:1536, unit:'cm³',
    explain:'分割法:上方正方體 = 8 × 8 × 8 = 512;下方長方體 = 16 × 8 × 8 = 1024;合計 512 + 1024 = 1536 cm³。' },
  { icon:'🌿', name:'森林道館', type:'split_3cube',
    q:'呆呆獸的樓梯由 3 個大小相同的正方體組成,每個邊長 8 cm。整個立體的體積是多少?',
    formula:'3 × 8³ = 3 × 512', answer:1536, unit:'cm³',
    explain:'分割法:每個正方體 = 8 × 8 × 8 = 512 cm³;3 個合共 = 512 × 3 = 1536 cm³。' },
  { icon:'⛰️', name:'岩石道館', type:'split',
    q:'階梯岩石分成上下兩部分:上方為邊長 4 cm 的正方體,下方為長 10 cm、闊 6 cm、高 4 cm 的長方體。請計算總體積。',
    formula:'4³ + 10×6×4 = 64 + 240', answer:304, unit:'cm³',
    explain:'分割法:上方 = 4 × 4 × 4 = 64;下方 = 10 × 6 × 4 = 240;合計 64 + 240 = 304 cm³。' },
  { icon:'💎', name:'地面道館', type:'fill',
    q:'缺角岩塊:原為長 10 cm、闊 10 cm、高 2 cm 的長方體,被挖去一個 4×4×2 cm 的角。請使用填補法計算剩餘體積。',
    formula:'10×10×2 − 4×4×2 = 200 − 32', answer:168, unit:'cm³',
    explain:'填補法:完整體積 = 10 × 10 × 2 = 200;缺角部分 = 4 × 4 × 2 = 32;剩餘 = 200 − 32 = 168 cm³。' },
  { icon:'⚡', name:'電氣道館', type:'split_u',
    q:'U 型立體:總寬 14 m、總高 11 m、厚度 5 m,左柱寬 5 m、右柱寬 3 m,底部高 6 m,凹槽寬 6 m、高 5 m。請使用分割法計算總體積。',
    formula:'5×5×5 + 3×5×5 + 14×5×6 = 125 + 75 + 420', answer:620, unit:'m³',
    explain:'分割法:左柱 = 5 × 5 × 5 = 125;右柱 = 3 × 5 × 5 = 75;底部 = 14 × 5 × 6 = 420;合計 = 125 + 75 + 420 = 620 m³。' },
  { icon:'🥊', name:'格鬥道館', type:'fill_u',
    q:'用填補法計算同一個 U 型立體(總寬 14 m、總高 11 m、厚度 5 m,凹槽寬 6 m、高 5 m)的體積。',
    formula:'14×5×11 − 6×5×5 = 770 − 150', answer:620, unit:'m³',
    explain:'填補法:完整大長方體 = 14 × 5 × 11 = 770;中間虛擬方塊 = 6 × 5 × 5 = 150;實體 = 770 − 150 = 620 m³。兩種方法答案一致。' },
  { icon:'🌊', name:'水系道館', type:'fill_box',
    q:'水箭龜的水箱是一個長 36 cm、闊 3 cm、高 2 cm 的長方體。若改用一個正方體水箱(體積完全相等),正方體邊長是多少?',
    formula:'36×3×2 = 216;3√216 = ?', answer:6, unit:'cm',
    explain:'長方體體積 = 36 × 3 × 2 = 216 cm³;正方體邊長 × 邊長 × 邊長 = 216;6 × 6 × 6 = 216,所以邊長 = 6 cm。' },
  { icon:'🌸', name:'草系道館', type:'cube_edge',
    q:'妙蛙種子的玻璃溫室是正方體,外圍所有稜(邊)的總長度是 60 cm。完成後的體積是多少立方厘米?',
    formula:'每邊 = 60 ÷ 12 = 5;V = 5³', answer:125, unit:'cm³',
    explain:'正方體有 12 條稜,每條 = 60 ÷ 12 = 5 cm;體積 = 5 × 5 × 5 = 125 cm³。' },
  { icon:'😴', name:'卡比道館', type:'cube_diff',
    q:'卡比獸的食物盒原是邊長 12 cm 的正方體。將每條邊都增加 6 cm,新食物盒比原來增加了多少立方厘米?',
    formula:'18³ − 12³ = 5832 − 1728', answer:4104, unit:'cm³',
    explain:'新邊長 = 12 + 6 = 18 cm;新體積 = 18 × 18 × 18 = 5832;原體積 = 12 × 12 × 12 = 1728;增加 = 5832 − 1728 = 4104 cm³。' },
  { icon:'👑', name:'冠軍道館', type:'fill',
    q:'冠軍試煉:原為長 13 cm、闊 4 cm、高 8 cm 的長方體石板,被挖去一個長 4 cm、闊 4 cm、高 4 cm 的長方體洞。剩餘體積是多少?',
    formula:'13×4×8 − 4×4×4 = 416 − 64', answer:352, unit:'cm³',
    explain:'填補法:完整 = 13 × 4 × 8 = 416;洞 = 4 × 4 × 4 = 64;剩餘 = 416 − 64 = 352 cm³。' },
];

let state = { current:0, score:0, wrongs:0, mistakes:0, startTime:0, answered:false };

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  state = { current:0, score:0, wrongs:0, mistakes:0, startTime:Date.now(), answered:false };
  showScreen('gameScreen');
  loadIsland();
}

function restartGame(){ showScreen('startScreen'); }

function loadIsland(){
  const isl = ISLANDS[state.current];
  if (!isl) { endGame(true); return; }
  state.answered = false;

  document.getElementById('progressTxt').textContent = (state.current+1) + ' / ' + ISLANDS.length;
  document.getElementById('scoreTxt').textContent = state.score;
  document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

  // map strip
  let html='';
  for(let i=0;i<ISLANDS.length;i++){
    let cls='island';
    if(i<state.current)cls+=' done';
    else if(i===state.current)cls+=' current';
    else cls+=' locked';
    html+=`<div class="${cls}">${i<state.current?'✓':(i===state.current?ISLANDS[i].icon:'🔒')}</div>`;
    if(i<ISLANDS.length-1) html+='<span class="wave">·</span>';
  }
  document.getElementById('mapStrip').innerHTML=html;

  // scene
  document.getElementById('islandIcon').textContent = isl.icon;
  document.getElementById('islandName').textContent = `第 ${state.current+1} 道館 · ${isl.name}`;
  document.getElementById('qText').textContent = isl.q;
  document.getElementById('formulaHint').textContent = '💡 ' + isl.formula;
  document.getElementById('ansUnit').textContent = isl.unit;
  const inp = document.getElementById('ansInput');
  inp.value=''; inp.classList.remove('correct','wrong'); inp.disabled=false;
  inp.focus();

  document.getElementById('feedback').classList.remove('show','right','wrong');
  document.getElementById('nextBtn').classList.remove('show');
}

function checkAnswer(){
  if (state.answered) return;
  const isl = ISLANDS[state.current];
  const inp = document.getElementById('ansInput');
  const userVal = parseFloat(inp.value);
  if (isNaN(userVal) || inp.value.trim()===''){ inp.focus(); return; }
  state.answered = true;
  inp.disabled = true;

  const fb = document.getElementById('feedback');
  if (Math.abs(userVal - isl.answer) < 0.01){
    state.score += 10;
    inp.classList.add('correct');
    fb.className = 'feedback right show';
    fb.innerHTML = `✅ 答對！皮卡丘都讚你厲害！${isl.explain}`;
    document.getElementById('scoreTxt').textContent = state.score;
  } else {
    state.wrongs++;
    state.mistakes++;
    inp.classList.add('wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ 答錯了！正確答案：<b>${isl.answer} ${isl.unit}</b><br>${isl.explain}<br>💡 公式：${isl.formula}`;
    document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

    // Track wrong (Supabase)
    if (window.LWWFWrong) {
      window.LWWFWrong.record({
        chapter: 18, question: isl.q,
        correct_answer: isl.answer + ' ' + isl.unit,
        student_answer: inp.value + ' ' + isl.unit,
        source: 'game1',
      }).catch(() => null);
    }

    if (state.wrongs >= 5){
      setTimeout(() => endGame(false), 1500);
      return;
    }
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextRoom(){
  state.current++;
  if (state.current >= ISLANDS.length) endGame(true);
  else loadIsland();
}

function endGame(victory){
  showScreen('endScreen');
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const correct = ISLANDS.length - state.mistakes;
  let coins = 0;
  if (victory){
    if (state.mistakes === 0) coins = 3;
    else if (state.mistakes <= 2) coins = 2;
    else coins = 1;
  }
  ['coin1','coin2','coin3'].forEach((id,i) => {
    const c = document.getElementById(id);
    c.classList.add('show');
    c.classList.toggle('bw', i >= coins);
  });

  document.getElementById('endTitle').textContent = victory ? '🏆 道館徽章到手！' : '😢 訓練家挑戰失敗';
  document.getElementById('endChar').src = 'images/pikachu.png';

  document.getElementById('statsInfo').innerHTML = `
    <div><b>得分：</b>${state.score} 分</div>
    <div><b>正確：</b>${correct} / ${ISLANDS.length}</div>
    <div><b>失誤：</b>${state.mistakes} 次</div>
    <div><b>用時：</b>${elapsed} 秒</div>
    <div><b>金幣：</b>${coins} / 3</div>
  `;

  // Save progress
  try {
    const k = (() => {
      try {
        const u = JSON.parse(localStorage.getItem('lwwf_auth_user') || 'null');
        if (u && u.class && u.number) return `progress_ch18_${u.class}_${u.number}`;
      } catch (e) {}
      return 'progress_ch18';
    })();
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p.game1 = Object.assign(p.game1 || {}, {
      done: victory, ts: Date.now(), score: state.score,
      coins, correct, total: ISLANDS.length, mistakes: state.mistakes,
    });
    localStorage.setItem(k, JSON.stringify(p));
  } catch (e) {}
}

// Enter key submits
document.getElementById('ansInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});
