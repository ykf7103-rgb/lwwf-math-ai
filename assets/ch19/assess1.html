<script>
const CHAPTER = 19, DECK_KEY = 'assess1', IMG_PREFIX = 'assess1';

// Ch19 評估 1 · LO #1+#2 列方程 + 解一步方程（蠟筆小新主題）
// p01-p12 = 6 對 Q-A — Q array 完全對應實際 NLM JPG 內容（OCR'd 2026-05-02）
const Q = [
  { q: '挑戰一 · 小新的漫畫堆：媽媽說「家裏原有漫畫書 w 本，我今天再買了 7 本給你，現在家裏總共有 28 本。」哪個方程正確？', opts: ['A. w − 7 = 28','B. w + 7 = 28','C. 28 + 7 = w','D. w = 28 + 7'], a: 1, hint: '原有 w 本 ＋ 新買 7 本 = 現在總共 28 本 → w + 7 = 28（B）。方程的關鍵是用等號連接代數式和實際數量。', pageQ: 1, pageA: 2 },
  { q: '挑戰二 · 動感超人金卡：「每包金卡有 T 張，我買了 3 包，一共得到 90 張！」哪個方程正確表示？', opts: ['A. T + 3 = 90','B. T ÷ 3 = 90','C. 3T = 90','D. 90 − T = 3'], a: 2, hint: '每包 T 張 × 3 包 = 90 張 → 3T = 90（C）。記住：3T 代表 3 乘以 T，不是 3 加 T！', pageQ: 3, pageA: 4 },
  { q: '挑戰三 · 小白的豪華大餐：一包重 u 克的狗糧，平均分成 5 份，剛好分盡。每份狗糧重 20 克。哪一道方程是正確的？', opts: ['A. 5 ÷ u = 20','B. u ÷ 5 = 20','C. u − 5 = 20','D. 5u = 20'], a: 1, hint: '總數 u ÷ 份數 5 = 每份 20 → u ÷ 5 = 20（B）。「分數即是除法」，所以 u/5 = 20。', pageQ: 5, pageA: 6 },
  { q: '挑戰四 · 小新的卡片分類難題：小新分不清「代數式」和「方程」。下列哪一張卡片寫的才是真正的「方程」？', opts: ['A. a + 7','B. 15 − 8 = 7','C. x − 4 = 10','D. 30 ÷ 5'], a: 2, hint: '方程必須同時具備：1) 含有未知數（如 x），2) 是等式（有等號）。(A) 沒有等號→代數式，(B) 沒有未知數，(D) 沒有等號 → 只有 (C) x − 4 = 10 兩個條件都符合。', pageQ: 7, pageA: 8 },
  { q: '挑戰五 · 小新的超長算式：某數 (x) 乘以 4 再加 7 等於 39。下面哪一個才是正確的列式方法（避免等號錯誤）？', opts: ['A. 4x + 7 = 39 = (39 − 7) ÷ 4 = 8','B. x = (39 − 7) ÷ 4','C. 4x + 7 = 39','D. x × 4 + 7 = 39 = 32 ÷ 4 = 8'], a: 2, hint: '等號不是「計算下一步」的符號，等號是天平，只表示左右兩邊數值相等。正確寫法是一行只有一個等號 → C: 4x + 7 = 39（建立關係）。', pageQ: 9, pageA: 10 },
  { q: '挑戰六 · 解密巧克比：面對兩步計算的方程 4x − 12 = 28，想要找出未知數 x，第一步應該做什麼？', opts: ['A. 左右兩邊同時除以 4','B. 左邊的 12 和右邊的 28 相加','C. 左右兩邊同時減去 12','D. 左右兩邊同時加上 12'], a: 3, hint: '目標：讓 x 獨自留在等號的一邊。先處理獨立的數字「− 12」，左右兩邊同時加 12 抵消減法 → 4x = 40。然後再除以 4 得 x = 10。千萬不要先除以 4！', pageQ: 11, pageA: 12 }
];

// 2026-05-04 fix: 答案隨機化 — 每次 render 將 opts 位置 shuffle，但 logic 仍記住正確答案 text
// 用戶 critical bug: ch14/ch15 全部 a:0 → 學生猜 A 必中。改用 render-time Fisher-Yates。
function shuffleQuestion(q) {
  if (!q.opts || q.opts.length < 2) return q;
  const correctText = q.opts[q.a];           // STEP 1: remember correct text BEFORE shuffle
  const shuffled = [...q.opts];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const newA = shuffled.indexOf(correctText);  // STEP 2: find new index of correct text
  return { ...q, opts: shuffled, a: newA };    // STEP 3: keep all other fields (hint, pageQ, pageA)
}
const Q_SHUFFLED = Q.map(shuffleQuestion);     // shuffle ONCE per page session (idempotent)


function pad2(n){ return String(n).padStart(2,'0'); }
function switchMode(mode) { document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode)); document.getElementById('slidesPanel').classList.toggle('active', mode === 'slides'); document.getElementById('listPanel').classList.toggle('active', mode === 'list'); if (mode === 'list' && !listRendered) { renderList(); listRendered = true; } }

// ==== Mode A: Slide with Q→A phases ====
let slideIdx = 0;                           // current question (0-5)
let slidePhase = 'question';                // 'question' or 'answer'
let slideCorrect = 0;
let slideWrongs = 0;
const slideAnswered = new Array(Q_SHUFFLED.length).fill(null);  // stores chosen idx

function renderSlide() {
  const q = Q_SHUFFLED[slideIdx];
  const pageNum = slidePhase === 'question' ? q.pageQ : q.pageA;
  document.getElementById('slideImg').src = `pages/${IMG_PREFIX}_p${pad2(pageNum)}.jpg`;
  document.getElementById('slideQNum').textContent = `${slideIdx+1} / ${Q_SHUFFLED.length}`;
  document.getElementById('slideQLabel').textContent = `第 ${slideIdx+1} 題`;
  document.getElementById('slideCorrect').textContent = slideCorrect;
  document.getElementById('slideWrongs').textContent = slideWrongs;
  document.getElementById('slidePfill').style.width = Math.round((slideIdx + (slidePhase==='answer'?0.5:0) + 0.5) / Q_SHUFFLED.length * 100) + '%';

  // Phase badge
  const badge = document.getElementById('phaseBadge');
  if (slidePhase === 'question') {
    badge.className = 'phase-badge question'; badge.textContent = '📖 題目頁（讀完再作答）';
  } else {
    badge.className = 'phase-badge answer'; badge.textContent = '✅ 答案頁（核對 + 筆記）';
  }

  // Question text + options
  document.getElementById('slideQText').textContent = q.q;
  const optsDiv = document.getElementById('slideOpts');
  optsDiv.innerHTML = '';
  // Adapt grid columns: 3-option questions use 3-col layout
  optsDiv.classList.toggle('three-cols', q.opts.length === 3);
  const chosen = slideAnswered[slideIdx];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'slide-opt';
    btn.innerHTML = `<span class="letter">${['A','B','C','D'][i]}</span><span>${opt}</span>`;
    if (chosen !== null) {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === chosen) btn.classList.add('wrong');
    } else {
      btn.onclick = () => slidePick(i);
    }
    optsDiv.appendChild(btn);
  });

  // Explain box
  const explain = document.getElementById('slideExplain');
  if (chosen !== null && slidePhase === 'answer') {
    explain.style.display = 'block';
    const correct = chosen === q.a;
    explain.className = 'slide-explain ' + (correct ? 'correct-box' : 'wrong-box');
    document.getElementById('slideExplainTitle').textContent = correct ? '✅ 答啱！小新都讚你叻！' : `❌ 你揀咗 ${['A','B','C','D'][chosen]}，正解係 ${['A','B','C','D'][q.a]}. ${q.opts[q.a]}`;
    document.getElementById('slideExplainBody').innerHTML = `💡 <b>小新筆記：</b>${q.hint}`;
  } else {
    explain.style.display = 'none';
  }

  // Nav buttons
  document.getElementById('slidePrev').disabled = slideIdx === 0 && slidePhase === 'question';
  const nb = document.getElementById('slideNext');
  nb.className = 'slide-btn next-btn';
  if (chosen === null) {
    nb.disabled = true;
    nb.textContent = '答咗先過 ▶';
  } else if (slidePhase === 'question') {
    nb.disabled = false;
    nb.textContent = '睇答案 ✓';
  } else if (slideIdx === Q_SHUFFLED.length - 1) {
    nb.disabled = false;
    nb.className = 'slide-btn done-btn';
    nb.textContent = '🎉 睇結果';
  } else {
    nb.disabled = false;
    nb.textContent = '下一題 ▶';
  }

  document.getElementById('wrongsNote').textContent = slideWrongs >= 3 ? `⚠️ 已連錯 ${slideWrongs} 次（錯 5 次要由頭做）` : '';
}

function slidePick(i) {
  if (slideAnswered[slideIdx] !== null) return;
  const q = Q_SHUFFLED[slideIdx];
  slideAnswered[slideIdx] = i;
  if (i === q.a) { slideCorrect++; slideWrongs = 0; }
  else { slideWrongs++; }
  renderSlide();
  if (slideWrongs >= 5) setTimeout(() => document.getElementById('lockModal').classList.add('show'), 800);
}

function slidePrev() {
  // Go back: from answer → question of same idx; from question → answer of prev idx
  if (slidePhase === 'answer') { slidePhase = 'question'; renderSlide(); }
  else if (slideIdx > 0) {
    slideIdx--;
    slidePhase = slideAnswered[slideIdx] !== null ? 'answer' : 'question';
    renderSlide();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function slideNext() {
  if (slideAnswered[slideIdx] === null) return;
  if (slidePhase === 'question') {
    slidePhase = 'answer';
    renderSlide();
    window.scrollTo({top:0, behavior:'smooth'});
  } else if (slideIdx < Q_SHUFFLED.length - 1) {
    slideIdx++;
    slidePhase = 'question';
    renderSlide();
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    showFinal(slideCorrect);
  }
}

function resetSlides() {
  slideIdx = 0; slidePhase = 'question'; slideCorrect = 0; slideWrongs = 0;
  slideAnswered.fill(null);
  document.getElementById('lockModal').classList.remove('show');
  renderSlide();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ==== Mode B: List ====
let listRendered = false;
const selected = new Array(Q_SHUFFLED.length).fill(-1);
let listSubmitted = false;

function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  Q_SHUFFLED.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    let html = `<div class="q-num">第 ${i+1} 題</div><div class="q-text">${q.q}</div><div class="opts${q.opts.length===3?' three-cols':''}" id="opts${i}">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="opt${selected[i]===oi?' selected':''}" onclick="pickList(${i},${oi})"><span class="letter">${['A','B','C','D'][oi]}</span><span>${opt}</span></button>`;
    });
    html += `</div>`;
    card.innerHTML = html;
    list.appendChild(card);
  });
  updateListStats();
}

function pickList(qIdx, optIdx) {
  if (listSubmitted) return;
  selected[qIdx] = optIdx;
  document.querySelectorAll(`#opts${qIdx} .opt`).forEach((b, i) => b.classList.toggle('selected', i === optIdx));
  updateListStats();
}

function updateListStats() {
  const ans = selected.filter(s => s !== -1).length;
  document.getElementById('answeredStat').textContent = ans;
  const btn = document.getElementById('submitBtn');
  if (ans === Q_SHUFFLED.length) { btn.disabled = false; btn.textContent = '✓ 提交答案 (檢查成績)'; }
  else { btn.disabled = true; btn.textContent = `仲有 ${Q_SHUFFLED.length - ans} 題未做`; }
}

function submitAll() {
  listSubmitted = true;
  let correct = 0;
  Q_SHUFFLED.forEach((q, i) => {
    const card = document.getElementById('qList').children[i];
    const btns = card.querySelectorAll('.opt');
    btns.forEach((b, oi) => {
      b.disabled = true;
      if (oi === q.a) b.classList.add('correct');
      else if (selected[i] === oi) b.classList.add('wrong');
    });
    if (selected[i] === q.a) { correct++; card.classList.add('correct-ans'); }
    else {
      card.classList.add('wrong-ans');
      const ex = document.createElement('div');
      ex.className = 'explain show';
      ex.innerHTML = `💡 ${q.hint}`;
      card.appendChild(ex);
    }
  });
  document.getElementById('correctStat').textContent = correct;
  document.getElementById('submitBtn').style.display = 'none';
  showFinal(correct);
}

function showFinal(correct) {
  const f = document.getElementById('finalScreen');
  f.classList.add('show');
  document.getElementById('finalScore').textContent = correct;
  let m, t;
  if (correct === Q_SHUFFLED.length) { m = '🌟 滿分！麥塊建造大師完美 cm³ 量度！'; t = '🏆'; }
  else if (correct >= 5) { m = '💪 好勁！再溫下錯嘅就完美'; t = '🥇'; }
  else if (correct >= 3) { m = '👍 不錯，記得睇下錯題嘅提示'; t = '🥈'; }
  else { m = '📖 多啲溫習簡報 1，再嚟挑戰'; t = '📚'; }
  document.getElementById('finalMsg').textContent = m;
  document.getElementById('finalTrophy').textContent = t;
  f.scrollIntoView({behavior:'smooth', block:'start'});
  try {
    const k = (()=>{try{const u=JSON.parse(localStorage.getItem("lwwf_auth_user")||"null");if(u&&u.class&&u.number)return`progress_ch${CHAPTER}_${u.class}_${u.number}`;}catch(e){}return`progress_ch${CHAPTER}`;})();
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p[DECK_KEY] = { done: true, score: correct, total: Q_SHUFFLED.length, ts: Date.now() };
    localStorage.setItem(k, JSON.stringify(p));
  } catch(e) {}
  try { window.parent.postMessage({ type:'assessScore', deck: DECK_KEY, correct, total: Q_SHUFFLED.length }, '*'); } catch(e) {}
}

renderSlide();
</script>
