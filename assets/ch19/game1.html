<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>第19課 · 遊戲 1 — 動感超人試煉（小新代數式與方程歷險）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;background:#000}
body{
  background:linear-gradient(135deg,#FFAB91 0%,#FFCCBC 50%,#FFE0B2 100%);
  color:#3E2723;min-height:100vh;display:flex;flex-direction:column;
}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(circle at 20% 30%,rgba(255,255,255,0.4) 2px,transparent 2px),
  radial-gradient(circle at 70% 70%,rgba(255,255,255,0.3) 3px,transparent 3px),
  radial-gradient(circle at 40% 60%,rgba(255,255,255,0.35) 2px,transparent 2px);
  background-size:140px 140px,180px 180px,100px 100px;
  pointer-events:none;z-index:-1}

.character{position:fixed;bottom:14px;right:14px;width:min(110px,16vw);z-index:50;pointer-events:none;
  filter:drop-shadow(2px 4px 6px rgba(0,0,0,0.5))}

.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px;text-align:center;overflow-y:auto}
.screen.active{display:flex}

#startScreen{justify-content:center}
#startScreen h1{font-family:'Noto Serif TC',serif;font-size:clamp(26px,6vw,52px);color:#D84315;
  text-shadow:0 0 25px rgba(216,67,21,0.4),2px 2px 0 #fff;margin-bottom:6px;font-weight:900;line-height:1.2}
#startScreen h2{font-size:clamp(15px,3vw,22px);color:#5D4037;margin-bottom:18px}
#startScreen .heroes{display:flex;gap:8px;justify-content:center;align-items:flex-end;margin:14px 0;flex-wrap:wrap}
#startScreen .heroes img{width:min(110px,22vw);height:auto;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.6));animation:bob 3s ease-in-out infinite}
#startScreen .heroes img:nth-child(2){animation-delay:.3s}
#startScreen .heroes img:nth-child(3){animation-delay:.6s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#startScreen .intro{
  max-width:480px;font-size:clamp(13px,2.5vw,15px);line-height:1.7;
  background:rgba(255,255,255,0.85);color:#3E2723;padding:14px 18px;border-radius:14px;
  border:2px solid rgba(216,67,21,0.45);margin-bottom:16px;box-shadow:0 4px 12px rgba(216,67,21,0.15);
}
.btn-start{font-size:clamp(17px,3.5vw,22px);padding:13px 32px;font-weight:700;
  background:linear-gradient(135deg,#FF7043,#D84315);color:#fff;
  border:none;border-radius:28px;cursor:pointer;
  box-shadow:0 6px 18px rgba(216,67,21,0.5);transition:all 0.2s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(216,67,21,0.7)}

#gameScreen{padding:8px;justify-content:flex-start}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;
  max-width:680px;background:rgba(255,255,255,0.9);padding:10px 14px;border-radius:14px;
  border:2px solid rgba(216,67,21,0.4);margin-bottom:10px;font-weight:700;flex-wrap:wrap;gap:8px}
.hud .item{display:flex;flex-direction:column;align-items:center;font-size:11px;color:#5D4037}
.hud .v{font-size:18px;color:#D84315;font-weight:900;line-height:1}

/* Treasure map progress */
.map-strip{display:flex;justify-content:center;gap:4px;width:100%;max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.map-strip .island{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:2px solid rgba(255,255,255,0.3)}
.map-strip .island.done{background:linear-gradient(135deg,#43A047,#1B5E20);border-color:#1B5E20}
.map-strip .island.current{background:linear-gradient(135deg,#FFD700,#FF8C00);border-color:#fff;
  animation:treasurePulse 1.2s infinite;box-shadow:0 0 12px gold}
@keyframes treasurePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.map-strip .island.locked{opacity:0.45}
.map-strip .wave{color:#1976D2;font-size:14px;align-self:center}

/* Treasure chest scene */
.treasure-scene{position:relative;width:100%;max-width:680px;
  background:linear-gradient(135deg,rgba(255,255,255,0.92),rgba(255,224,178,0.95));
  border:2px solid rgba(216,67,21,0.45);border-radius:18px;padding:16px;margin-bottom:10px;
  min-height:140px;text-align:center;box-shadow:0 8px 24px rgba(216,67,21,0.25)}
.treasure-scene .chest{width:min(150px,30vw);height:auto;margin:8px auto 0;display:block;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));animation:chestShake 2s ease-in-out infinite}
@keyframes chestShake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
.island-name{font-size:clamp(14px,2.8vw,18px);color:#D84315;font-weight:900;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;justify-content:center}
.island-name .icon{font-size:24px}
.q-text{font-size:clamp(15px,3.3vw,20px);font-weight:900;color:#3E2723;margin:8px 0 4px;
  background:rgba(255,255,255,0.92);padding:12px 16px;border-radius:12px;
  border:2px solid rgba(216,67,21,0.35);line-height:1.5}
.formula-hint{font-size:13px;color:#BF360C;font-style:italic;margin-top:6px}

/* Answer input */
.ans-row{display:flex;gap:8px;justify-content:center;align-items:center;width:100%;
  max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.ans-input{flex:1;min-width:160px;padding:14px 16px;background:rgba(255,255,255,0.95);color:#3E2723;
  border:3px solid #FF7043;border-radius:12px;font-size:1.3rem;font-weight:900;text-align:center;font-family:inherit}
.ans-input:focus{outline:none;border-color:#D84315;background:#FFF3E0}
.ans-input.correct{background:#C8E6C9;border-color:#2E7D32;color:#1B5E20}
.ans-input.wrong{background:#FFCDD2;border-color:#C62828;color:#B71C1C;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ans-unit{font-size:1rem;color:#D84315;font-weight:900;padding:0 4px}
.ans-submit{padding:14px 22px;background:linear-gradient(135deg,#FF7043,#D84315);color:#fff;
  border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:1rem}
.ans-submit:hover{transform:translateY(-2px)}

.feedback{display:none;font-size:14px;line-height:1.55;background:rgba(255,255,255,0.95);
  padding:12px 14px;border-radius:10px;border:2px solid rgba(216,67,21,0.45);color:#3E2723;
  margin-bottom:10px;width:100%;max-width:680px;text-align:left}
.feedback.show{display:block;animation:fadeIn .4s}
.feedback.right{background:rgba(76,175,80,0.2);border-color:#43A047;color:#A5D6A7}
.feedback.wrong{background:rgba(244,67,54,0.2);border-color:#C62828;color:#FFCDD2}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.next-btn{display:none;font-size:16px;padding:11px 26px;font-weight:700;
  background:linear-gradient(135deg,#43A047,#2E7D32);color:white;border:none;
  border-radius:24px;cursor:pointer;box-shadow:0 4px 12px rgba(67,160,71,0.5)}
.next-btn.show{display:inline-block;animation:popIn 0.4s}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* End screen */
#endScreen{justify-content:flex-start;padding-top:14px}
.end-title{font-family:'Noto Serif TC',serif;font-size:clamp(28px,6vw,44px);color:#D84315;
  text-shadow:0 0 20px rgba(216,67,21,0.4),2px 2px 0 #fff;margin-bottom:10px;font-weight:900}
.end-character{width:min(170px,40vw);margin:10px 0;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5))}
.coins-row{display:flex;justify-content:center;gap:14px;margin:14px 0}
.coins-row .coin-img{width:50px;height:50px;filter:drop-shadow(0 0 12px gold);
  animation:coinFlip 1s ease-out;opacity:0}
.coins-row .coin-img.show{opacity:1}
.coins-row .coin-img.bw{filter:grayscale(1) opacity(0.35)}
@keyframes coinFlip{0%{transform:rotateY(0deg) scale(0.3)}100%{transform:rotateY(720deg) scale(1)}}
.stats-info{font-size:15px;line-height:1.8;background:rgba(255,255,255,0.92);color:#3E2723;padding:14px 18px;
  border-radius:12px;border:2px solid rgba(216,67,21,0.35);margin-bottom:14px}
.stats-info b{color:#D84315}
.end-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

.back-link{position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.92);
  color:#D84315;padding:5px 12px;border-radius:8px;font-size:13px;text-decoration:none;
  border:2px solid rgba(216,67,21,0.45);z-index:100;font-weight:700}
</style>
</head>
<body>

<a href="index.html" class="back-link">← 返回</a>

<!-- ===== START SCREEN ===== -->
<div id="startScreen" class="screen active">
  <h1>🦸 動感超人試煉</h1>
  <h2>小新代數式與方程歷險 · 簡易方程一</h2>
  <div class="heroes" style="font-size:50px;display:flex;gap:20px;">
    <span style="animation:bob 3s infinite">🧒</span>
    <span style="animation:bob 3s infinite .3s">🦸</span>
    <span style="animation:bob 3s infinite .6s">⚖️</span>
  </div>
  <div class="intro">
    🌸 春日部嘅夏日節將至！動感超人邀請小新、風間、妮妮、正男、阿呆五位幼稚園朋友，
    挑戰 <b>10 個方程秘境</b>，每個秘境藏住一條未知數。要解開謎題攞紀念章，必須<b>計算未知數正確嘅值</b>！
    <br><br>
    📐 方法：找出未知數 → 兩邊同時加／減／乘／除相同數 → 把答案代入檢驗
    <br>
    🪙 全程零失誤可賺 3 金幣！
  </div>
  <button class="btn-start" onclick="startGame()">出發解謎 🚀</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <div class="item"><span>關卡</span><span class="v" id="progressTxt">1 / 10</span></div>
    <div class="item"><span>得分</span><span class="v" id="scoreTxt">0</span></div>
    <div class="item"><span>失誤</span><span class="v" id="wrongsTxt">0 / 5</span></div>
  </div>
  <div class="map-strip" id="mapStrip"></div>
  <div class="treasure-scene">
    <div class="island-name">
      <span class="icon" id="islandIcon">🏯</span>
      <span id="islandName">第 1 關 · 春日部試煉</span>
    </div>
    <div class="chest" id="chestImg" style="font-size:90px;animation:chestShake 2s ease-in-out infinite;">⚖️</div>
    <div class="q-text" id="qText">準備中...</div>
    <div class="formula-hint" id="formulaHint"></div>
  </div>
  <div class="ans-row">
    <input type="number" id="ansInput" class="ans-input" placeholder="輸入未知數的值..." inputmode="numeric" autocomplete="off">
    <span class="ans-unit" id="ansUnit"></span>
    <button class="ans-submit" onclick="checkAnswer()">🔍 提交</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextRoom()">下一關 ➜</button>
</div>

<!-- ===== END SCREEN ===== -->
<div id="endScreen" class="screen">
  <div class="end-title" id="endTitle">🏆 試煉達成！</div>
  <div id="endChar" style="font-size:100px;margin:10px 0;">🦸</div>
  <div class="coins-row">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin1">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin2">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin3">
  </div>
  <div class="stats-info" id="statsInfo"></div>
  <div class="end-buttons">
    <button class="btn-start" onclick="restartGame()">再玩一次 🔄</button>
    <a href="index.html" class="btn-start" style="text-decoration:none;display:inline-block;background:linear-gradient(135deg,#6a5acd,#483d8b);color:white">🏠 返回第19課</a>
  </div>
</div>

<!-- Wrong tracker -->
<script src="../common/wrong-tracker.js"></script>

<script>
// ============================================================
// 10 challenges — 第19課 LO: 代數式 / 方程概念 / 平衡法 解一步方程（書面語）
// ============================================================
const ISLANDS = [
  { icon:'🏯', name:'春日部試煉', type:'add',
    q:'小新原本有 X 顆糖果，媽媽再給他 5 顆，現在共有 12 顆。X 等於多少？',
    formula:'X + 5 = 12 → X = 12 − 5', answer:7, unit:'',
    explain:'兩邊同時減 5：X = 12 − 5 = 7' },
  { icon:'🏫', name:'雙葉幼稚園', type:'sub',
    q:'風間原本有 a 張動感超人卡，借出 8 張後剩下 14 張。a 等於多少？',
    formula:'a − 8 = 14 → a = 14 + 8', answer:22, unit:'',
    explain:'兩邊同時加 8：a = 14 + 8 = 22' },
  { icon:'🎈', name:'動感超人主題公園', type:'mul',
    q:'妮妮買了 3 件相同的玩具，每件 b 元，共付 75 元。b 等於多少？',
    formula:'3b = 75 → b = 75 ÷ 3', answer:25, unit:'元',
    explain:'兩邊同時除以 3：b = 75 ÷ 3 = 25 元' },
  { icon:'🍰', name:'蛋糕店挑戰', type:'div',
    q:'阿呆把 c 件蛋糕平均分給 4 個朋友，每人分得 6 件。c 等於多少？',
    formula:'c ÷ 4 = 6 → c = 6 × 4', answer:24, unit:'件',
    explain:'兩邊同時乘以 4：c = 6 × 4 = 24 件' },
  { icon:'⚖️', name:'天平秘境', type:'add',
    q:'天平左邊放 d kg 砝碼加 9 kg 砝碼，右邊放 25 kg 砝碼，左右平衡。d 等於多少？',
    formula:'d + 9 = 25 → d = 25 − 9', answer:16, unit:'kg',
    explain:'兩邊同時減 9：d = 25 − 9 = 16 kg' },
  { icon:'📚', name:'故事書收藏', type:'sub',
    q:'家裏原有故事書 e 本，妮妮借走 7 本後剩下 18 本。e 等於多少？',
    formula:'e − 7 = 18 → e = 18 + 7', answer:25, unit:'本',
    explain:'兩邊同時加 7：e = 18 + 7 = 25 本' },
  { icon:'🐶', name:'小白食物', type:'mul',
    q:'小新買 4 包狗糧，每包 f 元，共付 60 元。f 等於多少？',
    formula:'4f = 60 → f = 60 ÷ 4', answer:15, unit:'元',
    explain:'兩邊同時除以 4：f = 60 ÷ 4 = 15 元' },
  { icon:'🍡', name:'糰子分配', type:'div',
    q:'佐藤正男把 g 顆糰子平均分成 5 份，每份有 8 顆。g 等於多少？',
    formula:'g ÷ 5 = 8 → g = 8 × 5', answer:40, unit:'顆',
    explain:'兩邊同時乘以 5：g = 8 × 5 = 40 顆' },
  { icon:'🚗', name:'動感小車賽', type:'add',
    q:'小新原本有積分 h 分，動感超人比賽再加 14 分後變成 50 分。h 等於多少？',
    formula:'h + 14 = 50 → h = 50 − 14', answer:36, unit:'分',
    explain:'兩邊同時減 14：h = 50 − 14 = 36 分' },
  { icon:'🏆', name:'最終挑戰', type:'sub',
    q:'阿呆儲了 i 個貼紙，給了風間 19 個後剩下 13 個。i 等於多少？',
    formula:'i − 19 = 13 → i = 13 + 19', answer:32, unit:'個',
    explain:'兩邊同時加 19：i = 13 + 19 = 32 個' },
];

let state = { current:0, score:0, wrongs:0, mistakes:0, startTime:0, answered:false };

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  state = { current:0, score:0, wrongs:0, mistakes:0, startTime:Date.now(), answered:false };
  showScreen('gameScreen');
  loadIsland();
}

function restartGame(){ showScreen('startScreen'); }

function loadIsland(){
  const isl = ISLANDS[state.current];
  if (!isl) { endGame(true); return; }
  state.answered = false;

  document.getElementById('progressTxt').textContent = (state.current+1) + ' / ' + ISLANDS.length;
  document.getElementById('scoreTxt').textContent = state.score;
  document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

  // map strip
  let html='';
  for(let i=0;i<ISLANDS.length;i++){
    let cls='island';
    if(i<state.current)cls+=' done';
    else if(i===state.current)cls+=' current';
    else cls+=' locked';
    html+=`<div class="${cls}">${i<state.current?'✓':(i===state.current?ISLANDS[i].icon:'🔒')}</div>`;
    if(i<ISLANDS.length-1) html+='<span class="wave">~</span>';
  }
  document.getElementById('mapStrip').innerHTML=html;

  // scene
  document.getElementById('islandIcon').textContent = isl.icon;
  document.getElementById('islandName').textContent = `第 ${state.current+1} 關 · ${isl.name}`;
  document.getElementById('qText').textContent = isl.q;
  document.getElementById('formulaHint').textContent = '💡 ' + isl.formula;
  document.getElementById('ansUnit').textContent = isl.unit;
  const inp = document.getElementById('ansInput');
  inp.value=''; inp.classList.remove('correct','wrong'); inp.disabled=false;
  inp.focus();

  document.getElementById('feedback').classList.remove('show','right','wrong');
  document.getElementById('nextBtn').classList.remove('show');
}

function checkAnswer(){
  if (state.answered) return;
  const isl = ISLANDS[state.current];
  const inp = document.getElementById('ansInput');
  const userVal = parseFloat(inp.value);
  if (isNaN(userVal) || inp.value.trim()===''){ inp.focus(); return; }
  state.answered = true;
  inp.disabled = true;

  const fb = document.getElementById('feedback');
  if (Math.abs(userVal - isl.answer) < 0.01){
    state.score += 10;
    inp.classList.add('correct');
    fb.className = 'feedback right show';
    fb.innerHTML = `✅ 正確！${isl.explain}`;
    document.getElementById('scoreTxt').textContent = state.score;
  } else {
    state.wrongs++;
    state.mistakes++;
    inp.classList.add('wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ 答錯了！正確答案：<b>${isl.answer} ${isl.unit}</b><br>${isl.explain}<br>💡 公式：${isl.formula}`;
    document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

    // Track wrong (Supabase)
    if (window.LWWFWrong) {
      window.LWWFWrong.record({
        chapter: 19, question: isl.q,
        correct_answer: isl.answer + ' ' + isl.unit,
        student_answer: inp.value + ' ' + isl.unit,
        source: 'game1',
      }).catch(() => null);
    }

    if (state.wrongs >= 5){
      setTimeout(() => endGame(false), 1500);
      return;
    }
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextRoom(){
  state.current++;
  if (state.current >= ISLANDS.length) endGame(true);
  else loadIsland();
}

function endGame(victory){
  showScreen('endScreen');
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const correct = ISLANDS.length - state.mistakes;
  let coins = 0;
  if (victory){
    if (state.mistakes === 0) coins = 3;
    else if (state.mistakes <= 2) coins = 2;
    else coins = 1;
  }
  ['coin1','coin2','coin3'].forEach((id,i) => {
    const c = document.getElementById(id);
    c.classList.add('show');
    c.classList.toggle('bw', i >= coins);
  });

  document.getElementById('endTitle').textContent = victory ? '🏆 試煉達成！' : '😢 任務失敗';
  document.getElementById('endChar').textContent = victory ? '🦸' : '😅';

  document.getElementById('statsInfo').innerHTML = `
    <div><b>得分：</b>${state.score} 分</div>
    <div><b>正確：</b>${correct} / ${ISLANDS.length}</div>
    <div><b>失誤：</b>${state.mistakes} 次</div>
    <div><b>用時：</b>${elapsed} 秒</div>
    <div><b>金幣：</b>${coins} / 3</div>
  `;

  // Save progress
  try {
    const k = (() => {
      try {
        const u = JSON.parse(localStorage.getItem('lwwf_auth_user') || 'null');
        if (u && u.class && u.number) return `progress_ch19_${u.class}_${u.number}`;
      } catch (e) {}
      return 'progress_ch19';
    })();
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p.game1 = Object.assign(p.game1 || {}, {
      done: victory, ts: Date.now(), score: state.score,
      coins, correct, total: ISLANDS.length, mistakes: state.mistakes,
    });
    localStorage.setItem(k, JSON.stringify(p));
  } catch (e) {}
}
