<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>第17課 · 遊戲 1 — 寶藏獵人（海賊王體積大冒險）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;background:#000}
body{
  background:linear-gradient(to bottom,rgba(0,40,80,0.55),rgba(0,80,140,0.65)),
    url('images/bg_sea.png') center/cover no-repeat fixed;
  color:#fff5e6;min-height:100vh;display:flex;flex-direction:column;
}

.character{position:fixed;bottom:14px;right:14px;width:min(110px,16vw);z-index:50;pointer-events:none;
  filter:drop-shadow(2px 4px 6px rgba(0,0,0,0.5))}

.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px;text-align:center;overflow-y:auto}
.screen.active{display:flex}

#startScreen{justify-content:center}
#startScreen h1{font-family:'Noto Serif TC',serif;font-size:clamp(26px,6vw,52px);color:#FFD700;
  text-shadow:0 0 25px rgba(255,215,0,0.7);margin-bottom:6px;font-weight:900;line-height:1.2}
#startScreen h2{font-size:clamp(15px,3vw,22px);color:#f5c76a;margin-bottom:18px}
#startScreen .heroes{display:flex;gap:8px;justify-content:center;align-items:flex-end;margin:14px 0;flex-wrap:wrap}
#startScreen .heroes img{width:min(110px,22vw);height:auto;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.6));animation:bob 3s ease-in-out infinite}
#startScreen .heroes img:nth-child(2){animation-delay:.3s}
#startScreen .heroes img:nth-child(3){animation-delay:.6s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#startScreen .intro{
  max-width:480px;font-size:clamp(13px,2.5vw,15px);line-height:1.7;
  background:rgba(0,0,0,0.55);padding:14px 18px;border-radius:14px;
  border:1px solid rgba(255,215,0,0.35);margin-bottom:16px;
}
.btn-start{font-size:clamp(17px,3.5vw,22px);padding:13px 32px;font-weight:700;
  background:linear-gradient(135deg,#FFD700,#FF8C00);color:#2a1400;
  border:none;border-radius:28px;cursor:pointer;
  box-shadow:0 6px 18px rgba(255,140,0,0.5);transition:all 0.2s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(255,140,0,0.7)}

#gameScreen{padding:8px;justify-content:flex-start}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;
  max-width:680px;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:14px;
  border:1px solid rgba(255,215,0,0.4);margin-bottom:10px;font-weight:700;flex-wrap:wrap;gap:8px}
.hud .item{display:flex;flex-direction:column;align-items:center;font-size:11px;color:#f5c76a}
.hud .v{font-size:18px;color:#FFD700;font-weight:900;line-height:1}

/* Treasure map progress */
.map-strip{display:flex;justify-content:center;gap:4px;width:100%;max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.map-strip .island{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:2px solid rgba(255,255,255,0.3)}
.map-strip .island.done{background:linear-gradient(135deg,#43A047,#1B5E20);border-color:#1B5E20}
.map-strip .island.current{background:linear-gradient(135deg,#FFD700,#FF8C00);border-color:#fff;
  animation:treasurePulse 1.2s infinite;box-shadow:0 0 12px gold}
@keyframes treasurePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.map-strip .island.locked{opacity:0.45}
.map-strip .wave{color:#1976D2;font-size:14px;align-self:center}

/* Treasure chest scene */
.treasure-scene{position:relative;width:100%;max-width:680px;
  background:linear-gradient(135deg,rgba(0,0,0,0.5),rgba(40,20,80,0.6));
  border:2px solid rgba(255,215,0,0.45);border-radius:18px;padding:16px;margin-bottom:10px;
  min-height:140px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.6)}
.treasure-scene .chest{width:min(150px,30vw);height:auto;margin:8px auto 0;display:block;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));animation:chestShake 2s ease-in-out infinite}
@keyframes chestShake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
.island-name{font-size:clamp(14px,2.8vw,18px);color:#FFD700;font-weight:900;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;justify-content:center}
.island-name .icon{font-size:24px}
.q-text{font-size:clamp(15px,3.3vw,20px);font-weight:900;color:#fff;margin:8px 0 4px;
  background:rgba(0,0,0,0.55);padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.35);line-height:1.5}
.formula-hint{font-size:13px;color:#FFD54F;font-style:italic;margin-top:6px}

/* Answer input */
.ans-row{display:flex;gap:8px;justify-content:center;align-items:center;width:100%;
  max-width:680px;margin-bottom:10px;flex-wrap:wrap}
.ans-input{flex:1;min-width:160px;padding:14px 16px;background:rgba(255,255,255,0.95);color:#2a1400;
  border:3px solid #FFD700;border-radius:12px;font-size:1.3rem;font-weight:900;text-align:center;font-family:inherit}
.ans-input:focus{outline:none;border-color:#FF8C00;background:#FFFDE7}
.ans-input.correct{background:#C8E6C9;border-color:#2E7D32;color:#1B5E20}
.ans-input.wrong{background:#FFCDD2;border-color:#C62828;color:#B71C1C;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ans-unit{font-size:1rem;color:#FFD700;font-weight:900;padding:0 4px}
.ans-submit{padding:14px 22px;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#2a1400;
  border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:1rem}
.ans-submit:hover{transform:translateY(-2px)}

.feedback{display:none;font-size:14px;line-height:1.55;background:rgba(255,215,0,0.18);
  padding:12px 14px;border-radius:10px;border:1px solid rgba(255,215,0,0.5);color:#FFD54F;
  margin-bottom:10px;width:100%;max-width:680px;text-align:left}
.feedback.show{display:block;animation:fadeIn .4s}
.feedback.right{background:rgba(76,175,80,0.2);border-color:#43A047;color:#A5D6A7}
.feedback.wrong{background:rgba(244,67,54,0.2);border-color:#C62828;color:#FFCDD2}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.next-btn{display:none;font-size:16px;padding:11px 26px;font-weight:700;
  background:linear-gradient(135deg,#43A047,#2E7D32);color:white;border:none;
  border-radius:24px;cursor:pointer;box-shadow:0 4px 12px rgba(67,160,71,0.5)}
.next-btn.show{display:inline-block;animation:popIn 0.4s}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* End screen */
#endScreen{justify-content:flex-start;padding-top:14px}
.end-title{font-family:'Noto Serif TC',serif;font-size:clamp(28px,6vw,44px);color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,0.6);margin-bottom:10px;font-weight:900}
.end-character{width:min(170px,40vw);margin:10px 0;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5))}
.coins-row{display:flex;justify-content:center;gap:14px;margin:14px 0}
.coins-row .coin-img{width:50px;height:50px;filter:drop-shadow(0 0 12px gold);
  animation:coinFlip 1s ease-out;opacity:0}
.coins-row .coin-img.show{opacity:1}
.coins-row .coin-img.bw{filter:grayscale(1) opacity(0.35)}
@keyframes coinFlip{0%{transform:rotateY(0deg) scale(0.3)}100%{transform:rotateY(720deg) scale(1)}}
.stats-info{font-size:15px;line-height:1.8;background:rgba(0,0,0,0.55);padding:14px 18px;
  border-radius:12px;border:1px solid rgba(255,215,0,0.3);margin-bottom:14px}
.stats-info b{color:#FFD700}
.end-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

.back-link{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);
  color:#FFD700;padding:5px 12px;border-radius:8px;font-size:13px;text-decoration:none;
  border:1px solid rgba(255,215,0,0.4);z-index:100}
</style>
</head>
<body>

<a href="index.html" class="back-link">← 返回</a>

<!-- ===== START SCREEN ===== -->
<div id="startScreen" class="screen active">
  <h1>🏴‍☠️ 寶藏獵人</h1>
  <h2>海賊王體積大冒險 · 長方體 + 正方體</h2>
  <div class="heroes">
    <img src="images/luffy.png" alt="路飛">
    <img src="images/zoro.png" alt="索隆">
    <img src="images/nami.png" alt="娜美">
  </div>
  <div class="intro">
    🏴‍☠️ 你係草帽海賊團嘅一員！跟住路飛、索隆、娜美一齊探索 <b>10 個秘密島嶼</b>，
    每個島嶼藏住一個寶箱。要打開寶箱攞寶藏，必須<b>計算正確嘅體積</b>！
    <br><br>
    📐 公式：長方體 V = 長 × 闊 × 高　｜　正方體 V = 邊 × 邊 × 邊
    <br>
    🪙 全程零失誤可賺 3 金幣！
  </div>
  <button class="btn-start" onclick="startGame()">出發冒險 ⛵</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <div class="item"><span>關卡</span><span class="v" id="progressTxt">1 / 10</span></div>
    <div class="item"><span>得分</span><span class="v" id="scoreTxt">0</span></div>
    <div class="item"><span>失誤</span><span class="v" id="wrongsTxt">0 / 5</span></div>
  </div>
  <div class="map-strip" id="mapStrip"></div>
  <div class="treasure-scene">
    <div class="island-name">
      <span class="icon" id="islandIcon">🏝️</span>
      <span id="islandName">第 1 島 · 起航日</span>
    </div>
    <img class="chest" id="chestImg" src="images/treasure_chest.png" alt="寶箱">
    <div class="q-text" id="qText">準備中...</div>
    <div class="formula-hint" id="formulaHint"></div>
  </div>
  <div class="ans-row">
    <input type="number" id="ansInput" class="ans-input" placeholder="輸入體積..." inputmode="numeric" autocomplete="off">
    <span class="ans-unit" id="ansUnit">cm³</span>
    <button class="ans-submit" onclick="checkAnswer()">⚓ 提交</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextRoom()">下一島嶼 ➜</button>
</div>

<!-- ===== END SCREEN ===== -->
<div id="endScreen" class="screen">
  <div class="end-title" id="endTitle">🏆 寶藏到手！</div>
  <img id="endChar" src="images/luffy.png" class="end-character" alt="勝利">
  <div class="coins-row">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin1">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin2">
    <img src="../ch12/images/coin_new.png" class="coin-img" id="coin3">
  </div>
  <div class="stats-info" id="statsInfo"></div>
  <div class="end-buttons">
    <button class="btn-start" onclick="restartGame()">再玩一次 🔄</button>
    <a href="index.html" class="btn-start" style="text-decoration:none;display:inline-block;background:linear-gradient(135deg,#6a5acd,#483d8b);color:white">🏠 返回第17課</a>
  </div>
</div>

<!-- Wrong tracker -->
<script src="../common/wrong-tracker.js"></script>

<script>
// ============================================================
// 10 islands — 第17課 LO: 長方體 + 正方體 體積（書面語）
// ============================================================
const ISLANDS = [
  { icon:'🏝️', name:'起航島', type:'rect',
    q:'路飛將寶箱量度，發現它係長方體 — 長 4 cm、闊 3 cm、高 2 cm。寶箱嘅體積是多少？',
    formula:'V = 長 × 闊 × 高 = 4 × 3 × 2', answer:24, unit:'cm³',
    explain:'4 × 3 × 2 = 24 (cm³)' },
  { icon:'⛵', name:'帆影島', type:'rect',
    q:'索隆喺寶箱發現一個長方體刀套 — 長 10 cm、闊 5 cm、高 4 cm。刀套嘅體積是多少？',
    formula:'V = 長 × 闊 × 高 = 10 × 5 × 4', answer:200, unit:'cm³',
    explain:'10 × 5 × 4 = 200 (cm³)' },
  { icon:'🐠', name:'珊瑚島', type:'rect',
    q:'娜美量度航海地圖箱（長方體） — 長 12 cm、闊 8 cm、高 5 cm。地圖箱嘅體積是多少？',
    formula:'V = 12 × 8 × 5', answer:480, unit:'cm³',
    explain:'12 × 8 × 5 = 480 (cm³)' },
  { icon:'🌋', name:'火山島', type:'cube',
    q:'山治發現一個正方體鑽石箱，邊長 6 cm。鑽石箱嘅體積是多少？',
    formula:'V = 邊 × 邊 × 邊 = 6³', answer:216, unit:'cm³',
    explain:'6 × 6 × 6 = 216 (cm³)' },
  { icon:'🦴', name:'骸骨島', type:'cube',
    q:'布魯克喺島中央揾到一個正方體骨頭箱，邊長 10 cm。骨頭箱嘅體積是多少？',
    formula:'V = 10³', answer:1000, unit:'cm³',
    explain:'10 × 10 × 10 = 1000 (cm³)' },
  { icon:'🏴‍☠️', name:'海賊旗島', type:'rect_find',
    q:'長方體寶箱嘅長係 8 cm、闊係 5 cm、體積係 200 cm³。求寶箱嘅高（cm）。',
    formula:'高 = 體積 ÷ (長 × 闊) = 200 ÷ 40', answer:5, unit:'cm',
    explain:'200 ÷ (8 × 5) = 200 ÷ 40 = 5 (cm)' },
  { icon:'🌊', name:'巨浪島', type:'rect_find',
    q:'長方體船倉嘅長係 20 cm、高係 4 cm、體積係 240 cm³。求船倉嘅闊（cm）。',
    formula:'闊 = 體積 ÷ (長 × 高)', answer:3, unit:'cm',
    explain:'240 ÷ (20 × 4) = 240 ÷ 80 = 3 (cm)' },
  { icon:'⚔️', name:'寶劍島', type:'cube_find',
    q:'索隆嘅正方體刀箱體積係 343 cm³。請問刀箱嘅邊長是多少？',
    formula:'邊 × 邊 × 邊 = 343；3√343 = ?', answer:7, unit:'cm',
    explain:'7 × 7 × 7 = 343，所以邊長 = 7 cm' },
  { icon:'🎁', name:'雙寶島', type:'combine',
    q:'路飛用 2 個邊長 5 cm 嘅正方體積木拼砌成一個長方體。長方體嘅體積是多少？',
    formula:'2 × (5 × 5 × 5) = 2 × 125', answer:250, unit:'cm³',
    explain:'每個正方體 = 5³ = 125 cm³；2 個合共 = 250 cm³' },
  { icon:'👑', name:'王者島', type:'cut',
    q:'娜美攞到一個長 8 cm、闊 6 cm、高 4 cm 嘅長方體蘿蔔糕，切走 ¼ 後剩餘體積是多少？',
    formula:'原體積 × 3/4', answer:144, unit:'cm³',
    explain:'8 × 6 × 4 = 192；192 × 3/4 = 144 (cm³)' },
];

let state = { current:0, score:0, wrongs:0, mistakes:0, startTime:0, answered:false };

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  state = { current:0, score:0, wrongs:0, mistakes:0, startTime:Date.now(), answered:false };
  showScreen('gameScreen');
  loadIsland();
}

function restartGame(){ showScreen('startScreen'); }

function loadIsland(){
  const isl = ISLANDS[state.current];
  if (!isl) { endGame(true); return; }
  state.answered = false;

  document.getElementById('progressTxt').textContent = (state.current+1) + ' / ' + ISLANDS.length;
  document.getElementById('scoreTxt').textContent = state.score;
  document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

  // map strip
  let html='';
  for(let i=0;i<ISLANDS.length;i++){
    let cls='island';
    if(i<state.current)cls+=' done';
    else if(i===state.current)cls+=' current';
    else cls+=' locked';
    html+=`<div class="${cls}">${i<state.current?'✓':(i===state.current?ISLANDS[i].icon:'🔒')}</div>`;
    if(i<ISLANDS.length-1) html+='<span class="wave">~</span>';
  }
  document.getElementById('mapStrip').innerHTML=html;

  // scene
  document.getElementById('islandIcon').textContent = isl.icon;
  document.getElementById('islandName').textContent = `第 ${state.current+1} 島 · ${isl.name}`;
  document.getElementById('qText').textContent = isl.q;
  document.getElementById('formulaHint').textContent = '💡 ' + isl.formula;
  document.getElementById('ansUnit').textContent = isl.unit;
  const inp = document.getElementById('ansInput');
  inp.value=''; inp.classList.remove('correct','wrong'); inp.disabled=false;
  inp.focus();

  document.getElementById('feedback').classList.remove('show','right','wrong');
  document.getElementById('nextBtn').classList.remove('show');
}

function checkAnswer(){
  if (state.answered) return;
  const isl = ISLANDS[state.current];
  const inp = document.getElementById('ansInput');
  const userVal = parseFloat(inp.value);
  if (isNaN(userVal) || inp.value.trim()===''){ inp.focus(); return; }
  state.answered = true;
  inp.disabled = true;

  const fb = document.getElementById('feedback');
  if (Math.abs(userVal - isl.answer) < 0.01){
    state.score += 10;
    inp.classList.add('correct');
    fb.className = 'feedback right show';
    fb.innerHTML = `✅ 正確！${isl.explain}`;
    document.getElementById('scoreTxt').textContent = state.score;
  } else {
    state.wrongs++;
    state.mistakes++;
    inp.classList.add('wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ 答錯了！正確答案：<b>${isl.answer} ${isl.unit}</b><br>${isl.explain}<br>💡 公式：${isl.formula}`;
    document.getElementById('wrongsTxt').textContent = state.wrongs + ' / 5';

    // Track wrong (Supabase)
    if (window.LWWFWrong) {
      window.LWWFWrong.record({
        chapter: 17, question: isl.q,
        correct_answer: isl.answer + ' ' + isl.unit,
        student_answer: inp.value + ' ' + isl.unit,
        source: 'game1',
      }).catch(() => null);
    }

    if (state.wrongs >= 5){
      setTimeout(() => endGame(false), 1500);
      return;
    }
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextRoom(){
  state.current++;
  if (state.current >= ISLANDS.length) endGame(true);
  else loadIsland();
}

function endGame(victory){
  showScreen('endScreen');
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const correct = ISLANDS.length - state.mistakes;
  let coins = 0;
  if (victory){
    if (state.mistakes === 0) coins = 3;
    else if (state.mistakes <= 2) coins = 2;
    else coins = 1;
  }
  ['coin1','coin2','coin3'].forEach((id,i) => {
    const c = document.getElementById(id);
    c.classList.add('show');
    c.classList.toggle('bw', i >= coins);
  });

  document.getElementById('endTitle').textContent = victory ? '🏆 寶藏到手！' : '😢 寶藏失落';
  document.getElementById('endChar').src = victory ? 'images/luffy.png' : 'images/zoro.png';

  document.getElementById('statsInfo').innerHTML = `
    <div><b>得分：</b>${state.score} 分</div>
    <div><b>正確：</b>${correct} / ${ISLANDS.length}</div>
    <div><b>失誤：</b>${state.mistakes} 次</div>
    <div><b>用時：</b>${elapsed} 秒</div>
    <div><b>金幣：</b>${coins} / 3</div>
  `;

  // Save progress
  try {
    const k = (() => {
      try {
        const u = JSON.parse(localStorage.getItem('lwwf_auth_user') || 'null');
        if (u && u.class && u.number) return `progress_ch17_${u.class}_${u.number}`;
      } catch (e) {}
      return 'progress_ch17';
    })();
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p.game1 = Object.assign(p.game1 || {}, {
      done: victory, ts: Date.now(), score: state.score,
      coins, correct, total: ISLANDS.length, mistakes: state.mistakes,
    });
    localStorage.setItem(k, JSON.stringify(p));
  } catch (e) {}
}

// Enter key submits
document.getElementById('ansInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});
</script>
<script src="../common/feedback.js"></script>
<script src="../common/chapter-header.js?v=20260505m" data-current-ch="17"></script>
</body>
</html>
