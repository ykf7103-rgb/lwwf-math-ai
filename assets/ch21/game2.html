<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>第21課 遊戲：天平兩步方程解鎖</title>
<style>
:root{--primary:#1565C0;--primary-light:#1E88E5;--primary-dark:#0D47A1;--gold:#FFC107;--success:#4CAF50;--error:#E53935;--bg:#F5F7FA;--card:#fff;--text:#263238;--muted:#546E7A;--line:#E0E7EE;--shadow:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:url("../common/images/school_bg.jpg") center/cover no-repeat;opacity:.08;z-index:-2}
body::after{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(21,101,192,.09),rgba(255,193,7,.13));z-index:-1}
.top{display:flex;gap:12px;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.95);position:sticky;top:0;z-index:5;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.top a{color:var(--primary);text-decoration:none;font-weight:900}.meter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{background:#FFF8E1;color:#7A4B00;border:2px solid rgba(255,193,7,.48);border-radius:999px;padding:7px 11px;font-weight:900}
.wrap{width:min(980px,100%);margin:auto;padding:22px 14px 40px}
.hero-card{background:linear-gradient(135deg,var(--primary-dark),var(--primary) 58%,var(--primary-light));color:#fff;border-radius:22px;padding:28px 22px;box-shadow:0 14px 34px rgba(13,71,161,.26);position:relative;overflow:hidden}
.hero-card::after{content:"4M";position:absolute;right:24px;top:18px;font-size:5rem;font-weight:900;color:rgba(255,255,255,.14);line-height:1}
h1{margin:0 0 10px;font-size:clamp(1.7rem,4.6vw,3rem);line-height:1.1;letter-spacing:0;font-weight:900}
.lead{color:rgba(255,255,255,.92);line-height:1.75;max-width:760px;margin:0}
.stage{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;align-items:stretch;margin-top:18px}
.box{background:var(--card);color:var(--text);border:2px solid #D7E8FB;border-radius:18px;padding:20px;box-shadow:var(--shadow)}
.asset{background:#fff;border:2px solid #D7E8FB;border-radius:18px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:var(--shadow)}.asset img{width:100%;height:100%;object-fit:cover}
.qno{font-weight:900;color:var(--primary);letter-spacing:.04em;text-transform:uppercase}.question{font-size:clamp(1.25rem,3.6vw,2.05rem);font-weight:900;line-height:1.35;margin:14px 0;color:var(--primary-dark)}
.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.choice{border:2px solid var(--line);background:#fff;color:var(--text);border-radius:14px;padding:14px;font-size:1.02rem;font-weight:900;cursor:pointer;min-height:58px;transition:.18s}.choice:hover{border-color:var(--primary-light);background:#E3F2FD;transform:translateY(-1px)}.choice.correct{background:#E8F5E9;border-color:var(--success);color:#1B5E20}.choice.wrong{background:#FFEBEE;border-color:var(--error);color:#B71C1C}
.feedback{margin-top:14px;padding:13px;border-radius:12px;background:#E3F2FD;border-left:5px solid var(--primary);line-height:1.65;display:none;color:var(--text)}.feedback.show{display:block}
.next,.btn{margin-top:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border:0;border-radius:12px;padding:12px 18px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 4px 14px rgba(21,101,192,.25)}.next{display:none}.next.show{display:inline-block}.btn.alt{background:linear-gradient(135deg,var(--gold),#FFD54F);color:#3E2A00}
.start,.end{text-align:center}.hide{display:none}.bar{height:12px;background:#E0E7EE;border-radius:999px;overflow:hidden;margin:16px 0}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary-light),var(--gold));transition:.25s}
.end{background:#fff;border:2px solid #D7E8FB;border-radius:22px;padding:28px 20px;box-shadow:var(--shadow)}.end .lead{color:var(--muted);margin:auto}
@media(max-width:760px){.stage{grid-template-columns:1fr}.asset{min-height:220px}.choices{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<nav class="top"><a href="index.html">← 第21課</a><div class="meter"><span class="pill">分數 <b id="scoreTop">0</b></span><span class="pill">連擊 <b id="comboTop">0</b></span><span class="pill">第 <b id="stepTop">0</b>/10 關</span></div></nav>
<main class="wrap">
<section id="start" class="start hero-card"><h1>天平兩步方程解鎖</h1><p class="lead" style="margin:auto">先消去加減項，再處理乘除項。</p><div class="bar"><div class="fill" style="width:100%"></div></div><button class="btn alt" onclick="startGame()">開始挑戰</button></section>
<section id="game" class="stage hide"><div class="box"><div class="qno" id="qno"></div><div class="question" id="question"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback"></div><button class="next" id="nextBtn" onclick="nextQuestion()">下一關</button><div class="bar"><div class="fill" id="progressFill"></div></div></div><aside class="asset"><img src="images/ai_equation_guardian.png" alt=""></aside></section>
<section id="end" class="end hide"><h1>任務完成</h1><p class="lead" id="endText"></p><p><a class="btn alt" href="game2.html">再玩一次</a> <a class="btn" href="index.html">返回入口</a></p></section>
</main>
<script>
const questions=[{"q": "4M - 12 = 8，M = ?", "a": "5", "choices": ["3", "4", "5", "20"], "ex": "兩邊加 12 得 4M = 20，再除以 4，M = 5。"}, {"q": "20 + 5t = 50，t = ?", "a": "6", "choices": ["5", "6", "10", "30"], "ex": "兩邊減 20 得 5t = 30，再除以 5，t = 6。"}, {"q": "84 = 6d + 42，d = ?", "a": "7", "choices": ["6", "7", "12", "42"], "ex": "兩邊減 42 得 42 = 6d，所以 d = 7。"}, {"q": "4e + 27 = 63，e = ?", "a": "9", "choices": ["8", "9", "10", "36"], "ex": "兩邊減 27 得 4e = 36，再除以 4。"}, {"q": "10a - 31 = 49，a = ?", "a": "8", "choices": ["8", "10", "18", "80"], "ex": "兩邊加 31 得 10a = 80，所以 a = 8。"}, {"q": "25 + 12Y = 169，Y = ?", "a": "12", "choices": ["8", "10", "12", "14"], "ex": "兩邊減 25 得 12Y = 144，所以 Y = 12。"}, {"q": "100 = 9r - 80，r = ?", "a": "20", "choices": ["2", "10", "20", "180"], "ex": "兩邊加 80 得 180 = 9r，所以 r = 20。"}, {"q": "A/6 - 9 = 11，A = ?", "a": "120", "choices": ["20", "60", "108", "120"], "ex": "兩邊加 9 得 A/6 = 20，再乘以 6。"}, {"q": "50 + h/5 = 78，h = ?", "a": "140", "choices": ["28", "90", "140", "390"], "ex": "兩邊減 50 得 h/5 = 28，再乘以 5。"}, {"q": "23 = t/8 - 18，t = ?", "a": "328", "choices": ["40", "184", "280", "328"], "ex": "兩邊加 18 得 41 = t/8，再乘以 8。"}];
let idx=0,score=0,combo=0,locked=false;
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function startGame(){document.getElementById("start").classList.add("hide");document.getElementById("game").classList.remove("hide");render();}
function render(){locked=false;const item=questions[idx];document.getElementById("qno").textContent=`Question ${idx+1}`;document.getElementById("question").textContent=item.q;document.getElementById("stepTop").textContent=idx+1;document.getElementById("scoreTop").textContent=score;document.getElementById("comboTop").textContent=combo;document.getElementById("progressFill").style.width=`${idx/questions.length*100}%`;document.getElementById("feedback").className="feedback";document.getElementById("feedback").textContent="";document.getElementById("nextBtn").className="next";document.getElementById("choices").innerHTML=item.choices.map(c=>`<button class="choice" data-choice="${esc(c)}">${esc(c)}</button>`).join("");document.querySelectorAll(".choice").forEach(btn=>btn.addEventListener("click",()=>answer(btn,btn.textContent)));}
function answer(btn,value){if(locked)return;locked=true;const item=questions[idx];const ok=value===item.a;document.querySelectorAll(".choice").forEach(b=>{if(b.textContent===item.a)b.classList.add("correct");});if(!ok)btn.classList.add("wrong");combo=ok?combo+1:0;score+=ok?100+combo*20:20;document.getElementById("scoreTop").textContent=score;document.getElementById("comboTop").textContent=combo;const fb=document.getElementById("feedback");fb.className="feedback show";fb.innerHTML=`<b>${ok?"答對！":"未中，看看正確做法。"}</b><br>${esc(item.ex)}`;document.getElementById("nextBtn").className="next show";}
function nextQuestion(){idx++;if(idx>=questions.length)return finish();render();}
function finish(){document.getElementById("game").classList.add("hide");document.getElementById("end").classList.remove("hide");document.getElementById("endText").textContent=`你的分數是 ${score}。能把題意轉成方程，再按步驟解題，就是第21課的核心。`;localStorage.setItem("ch21_game2_score",String(score));}
</script>
</body></html>
