<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>第12課 西遊記數學大冒險</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif}
html,body{height:100%;overflow:hidden;background:#000}
body{
  background:
    linear-gradient(to bottom,rgba(20,5,0,0.6),rgba(60,20,0,0.8)),
    url('images/bg_mountain.png') center/cover no-repeat;
  color:#fff5e6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ====== Screens ====== */
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;overflow-y:auto}
#endScreen{justify-content:flex-start;padding-top:20px;padding-bottom:24px}
.screen.active{display:flex}

/* ====== Start screen ====== */
#startScreen h1{
  font-family:'Noto Serif TC',serif;font-size:clamp(28px,6vw,56px);color:#FFD700;
  text-shadow:0 0 30px rgba(255,215,0,0.6);margin-bottom:10px;font-weight:900;
}
#startScreen h2{font-size:clamp(16px,3vw,24px);color:#f5c76a;margin-bottom:24px}
#startScreen .hero{
  width:min(200px,40vw);height:auto;margin:20px 0;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#startScreen p{
  max-width:480px;font-size:clamp(13px,2.5vw,16px);line-height:1.7;
  background:rgba(0,0,0,0.5);padding:16px 20px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);margin-bottom:20px;
}
.btn-start{
  font-size:clamp(18px,3.5vw,24px);padding:14px 36px;font-weight:700;
  background:linear-gradient(135deg,#FFD700,#FF8C00);color:#2a1400;
  border:none;border-radius:30px;cursor:pointer;
  box-shadow:0 6px 20px rgba(255,140,0,0.5);
  transition:all 0.2s;
}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,140,0,0.7)}
.btn-start:active{transform:translateY(0)}

/* ====== Battle screen ====== */
#battleScreen{justify-content:flex-start;padding:8px}

.hud{
  width:100%;max-width:900px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);margin-bottom:10px;flex-wrap:wrap;gap:8px;
}
.hp-bar{flex:1;min-width:180px;max-width:280px}
.hp-label{font-size:12px;color:#FFD700;margin-bottom:4px;display:flex;justify-content:space-between}
.hp-track{height:14px;background:rgba(255,255,255,0.1);border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.2)}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff4040,#ffaa00,#40ff40);transition:width 0.5s ease;border-radius:7px}
.score-block{text-align:center}
.score-big{font-size:clamp(24px,5vw,36px);font-weight:900;color:#FFD700}
.progress-text{font-size:13px;color:#f5c76a}

/* Fighters */
.arena{
  width:100%;max-width:900px;height:min(180px,25vh);
  display:flex;justify-content:space-around;align-items:flex-end;
  position:relative;padding:0 20px;margin-bottom:12px;
}
.fighter{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.fighter-img{
  width:clamp(90px,16vw,140px);height:auto;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,0.7));
  transition:transform 0.3s;
}
.fighter.attack .fighter-img{animation:heroAttack 0.5s}
.fighter.hit .fighter-img{animation:shake 0.4s}
.fighter.win .fighter-img{animation:winPose 1s}
@keyframes heroAttack{0%,100%{transform:translateX(0)}30%{transform:translateX(60px) scale(1.1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes winPose{0%,100%{transform:scale(1)}50%{transform:scale(1.2) rotate(-5deg)}}
.fighter-name{font-size:13px;color:#FFD700;font-weight:700;text-shadow:1px 1px 2px rgba(0,0,0,0.8)}

/* VS indicator */
.vs{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:clamp(32px,7vw,52px);font-weight:900;color:#FF4500;
  text-shadow:0 0 20px rgba(255,69,0,0.8);font-family:'Noto Serif TC',serif;
}

/* Question panel */
.qpanel{
  width:100%;max-width:900px;
  background:rgba(20,10,0,0.92);border:2px solid #8B6914;border-radius:16px;
  padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;
  overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.q-category{
  display:inline-block;font-size:12px;padding:3px 12px;
  background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);
  border-radius:12px;color:#FFD700;align-self:flex-start;
}
.q-text{
  font-size:clamp(20px,4vw,30px);font-weight:700;color:#fff5e6;
  line-height:1.5;text-align:center;padding:12px 0;min-height:60px;
}
.answers{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
@media(max-width:520px){.answers{grid-template-columns:1fr}}
.ans-btn{
  padding:14px 18px;font-size:clamp(16px,3vw,20px);font-weight:600;
  background:rgba(60,30,0,0.6);color:#fff5e6;
  border:2px solid rgba(139,105,20,0.6);border-radius:12px;
  cursor:pointer;transition:all 0.2s;text-align:center;
  font-family:'Noto Sans TC',sans-serif;
}
.ans-btn:hover:not(:disabled){border-color:#FFD700;background:rgba(139,105,20,0.3);transform:translateY(-2px)}
.ans-btn:disabled{cursor:default;opacity:0.75}
.ans-btn.correct{border-color:#40ff40;background:rgba(0,180,0,0.3);color:#80ff80;animation:pulse 0.4s}
.ans-btn.wrong{border-color:#ff4040;background:rgba(180,0,0,0.3);color:#ff8080;animation:shake 0.4s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.explanation{
  background:rgba(255,215,0,0.1);border-left:4px solid #FFD700;
  padding:12px 14px;border-radius:0 10px 10px 0;font-size:14px;line-height:1.6;
  color:#fff5d0;display:none;
}
.explanation.show{display:block;animation:fadeIn 0.4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.next-btn{
  padding:12px 28px;font-size:clamp(15px,3vw,18px);font-weight:700;
  background:linear-gradient(135deg,#FF8C00,#DC3545);color:#fff;
  border:none;border-radius:24px;cursor:pointer;display:none;
  align-self:center;box-shadow:0 4px 12px rgba(255,140,0,0.4);
}
.next-btn.show{display:block;animation:fadeIn 0.4s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,140,0,0.6)}

/* End screen */
#endScreen .end-title{
  font-family:'Noto Serif TC',serif;font-size:clamp(28px,5.5vw,48px);
  color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,0.6);margin-bottom:8px;font-weight:900;
}
#endScreen .end-character{width:min(140px,28vw);margin:8px 0;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6))}
.coins-row{display:flex;gap:12px;justify-content:center;margin:10px 0}
.coin-img{width:clamp(40px,8vw,60px);height:clamp(40px,8vw,60px);opacity:0.3;transition:all 0.6s}
.coin-img.earned{opacity:1;filter:drop-shadow(0 0 16px #FFD700);animation:coinPop 0.6s ease}
@keyframes coinPop{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}
.stats{
  background:rgba(0,0,0,0.6);padding:12px 18px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);margin:10px 0;
  font-size:clamp(13px,2.5vw,15px);line-height:1.6;color:#fff5e6;
}
.end-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}

/* Mute button */
.mute-btn{
  position:fixed;top:12px;right:12px;z-index:100;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,215,0,0.4);
  color:#fff;font-size:22px;width:42px;height:42px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>

<button class="mute-btn" id="muteBtn" title="音樂開關">🔊</button>

<!-- ===== START SCREEN ===== -->
<div id="startScreen" class="screen active">
  <h1>西遊記大冒險</h1>
  <h2>第12課 ── 有趣的乘法</h2>
  <img src="images/monkey_happy.png" alt="悟空" class="hero">
  <p>
    悟空取經途中遇到妖怪攔路！<br>
    答對 = <b style="color:#40ff80">⚔️ 攻擊妖怪</b>｜答錯 = <b style="color:#ff8080">💔 被攻擊</b><br>
    10 題全力以赴，爭取 <b style="color:#FFD700">3 枚金幣</b>！
  </p>
  <button class="btn-start" onclick="startGame()">開始冒險 ⚔️</button>
</div>

<!-- ===== BATTLE SCREEN ===== -->
<div id="battleScreen" class="screen">
  <!-- HUD -->
  <div class="hud">
    <div class="hp-bar">
      <div class="hp-label"><span>悟空 HP</span><span id="heroHpText">100/100</span></div>
      <div class="hp-track"><div class="hp-fill" id="heroHp" style="width:100%"></div></div>
    </div>
    <div class="score-block">
      <div class="score-big" id="score">0 分</div>
      <div class="progress-text" id="progress">第 1 / 10 題</div>
    </div>
    <div class="hp-bar">
      <div class="hp-label"><span id="monsterName">妖怪 HP</span><span id="monsterHpText">100/100</span></div>
      <div class="hp-track"><div class="hp-fill" id="monsterHp" style="width:100%;background:linear-gradient(90deg,#ff4040,#aa0000)"></div></div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="fighter" id="heroFighter">
      <img src="images/monkey_happy.png" alt="悟空" class="fighter-img" id="heroImg">
      <div class="fighter-name">齊天大聖</div>
    </div>
    <div class="vs">VS</div>
    <div class="fighter" id="monsterFighter">
      <img src="images/demon_ox.png" alt="妖怪" class="fighter-img" id="monsterImg">
      <div class="fighter-name" id="monsterNameLabel">小妖怪</div>
    </div>
  </div>

  <!-- Question -->
  <div class="qpanel">
    <div class="q-category" id="qCategory">乘法</div>
    <div class="q-text" id="qText">準備中...</div>
    <div class="answers" id="answers"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一關 ➜</button>
  </div>
</div>

<!-- ===== END SCREEN ===== -->
<div id="endScreen" class="screen">
  <div class="end-title" id="endTitle">勝利！</div>
  <img id="endChar" src="images/monkey_win.png" class="end-character" alt="結果">
  <div class="coins-row">
    <img src="images/coin_new.png" class="coin-img" id="coin1">
    <img src="images/coin_new.png" class="coin-img" id="coin2">
    <img src="images/coin_new.png" class="coin-img" id="coin3">
  </div>
  <div class="stats" id="stats"></div>
  <div class="end-buttons">
    <button class="btn-start" onclick="restartGame()">再玩一次 🔄</button>
  </div>
</div>

<!-- BGM Audio -->
<audio id="bgmIntro" src="../common/audio/game/bgm_intro.mp3" loop preload="auto"></audio>
<audio id="bgmBattle" src="../common/audio/game/bgm_battle.mp3" loop preload="auto"></audio>
<audio id="bgmVictory" src="../common/audio/game/bgm_victory.mp3" preload="auto"></audio>
<audio id="bgmDefeat" src="../common/audio/game/bgm_defeat.mp3" preload="auto"></audio>

<script>
// ============================================================
// QUESTION DATA  (10 questions for ch12 有趣的乘法)
// ============================================================
const QUESTIONS = [
  {category:'乘以10/100/1000',    text:'0.45 × 10 = ?',      options:['0.045','4.5','45','450'],correct:1,
   explain:'乘以 10：小數點向右移 1 位。0.45 → 4.5',
   monster:'demon_ox',name:'牛魔王'},
  {category:'乘以10/100/1000',    text:'0.007 × 1000 = ?',    options:['0.7','7','70','700'],correct:1,
   explain:'乘以 1000：小數點向右移 3 位。0.007 → 7',
   monster:'demon_bone',name:'白骨精'},
  {category:'乘以0.1/0.01/0.001', text:'56 × 0.1 = ?',        options:['560','5.6','0.56','0.056'],correct:1,
   explain:'乘以 0.1：小數點向左移 1 位。56 → 5.6',
   monster:'demon_ox',name:'牛魔王'},
  {category:'乘以0.1/0.01/0.001', text:'2.6 × 0.001 = ?',     options:['260','0.26','0.026','0.0026'],correct:3,
   explain:'乘以 0.001：小數點向左移 3 位。2.6 → 0.0026',
   monster:'demon_bone',name:'白骨精'},
  {category:'單位轉換',           text:'3.5 公里 = ? 米',      options:['35','350','3500','35000'],correct:2,
   explain:'1 公里 = 1000 米，3.5 × 1000 = 3500',
   monster:'demon_ox',name:'牛魔王'},
  {category:'單位轉換',           text:'250 克 = ? 公斤',     options:['2.5','0.25','25','0.025'],correct:1,
   explain:'1 公斤 = 1000 克，250 ÷ 1000 = 0.25',
   monster:'demon_bone',name:'白骨精'},
  {category:'應用題',             text:'一枝鉛筆 $3.5，買 100 枝要幾多錢？',options:['$35','$350','$3500','$0.35'],correct:1,
   explain:'3.5 × 100 = 350，小數點右移 2 位',
   monster:'demon_ox',name:'牛魔王'},
  {category:'應用題',             text:'一瓶水 1.5 升，喝了 0.1 瓶，喝了幾多升？',options:['0.15','0.015','1.5','15'],correct:0,
   explain:'1.5 × 0.1 = 0.15，小數點左移 1 位',
   monster:'demon_bone',name:'白骨精'},
  {category:'混合',               text:'0.8 × 100 × 0.01 = ?',options:['0.08','0.8','8','80'],correct:1,
   explain:'0.8 × 100 = 80，80 × 0.01 = 0.8',
   monster:'demon_ox',name:'牛魔王'},
  {category:'終極挑戰',           text:'0.125 × 1000 × 0.1 = ?',options:['1.25','12.5','125','0.125'],correct:1,
   explain:'0.125 × 1000 = 125，125 × 0.1 = 12.5',
   monster:'demon_bone',name:'牛魔王（最終 BOSS）'},
];

// ============================================================
// STATE
// ============================================================
let state = {currentQ:0, score:0, hp:100, correct:0, startTime:0, answered:false};

// ============================================================
// SCREEN
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// START + RESTART
// ============================================================
function startGame(){
  state = {currentQ:0, score:0, hp:100, correct:0, startTime:Date.now(), answered:false};
  showScreen('battleScreen');
  bgMusic.start();
  loadQuestion();
}

function restartGame(){
  showScreen('startScreen');
}

// ============================================================
// LOAD QUESTION
// ============================================================
function loadQuestion(){
  const q = QUESTIONS[state.currentQ];
  if(!q){ endGame(); return; }
  state.answered = false;

  // HUD
  document.getElementById('score').textContent = state.score + ' 分';
  document.getElementById('progress').textContent = '第 ' + (state.currentQ+1) + ' / ' + QUESTIONS.length + ' 題';
  document.getElementById('heroHp').style.width = state.hp + '%';
  document.getElementById('heroHpText').textContent = state.hp + '/100';
  document.getElementById('monsterHp').style.width = '100%';
  document.getElementById('monsterHpText').textContent = '100/100';
  document.getElementById('monsterName').textContent = q.name + ' HP';
  document.getElementById('monsterNameLabel').textContent = q.name;
  document.getElementById('monsterImg').src = 'images/' + q.monster + '.png';

  // Question
  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('qText').textContent = q.text;

  // Answers
  const grid = document.getElementById('answers');
  grid.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.options.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = '<b>'+labels[i]+'.</b> '+opt;
    btn.onclick = () => answer(i);
    grid.appendChild(btn);
  });

  // Reset explanation + next
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  // Hero back to default pose
  document.getElementById('heroImg').src = 'images/monkey_happy.png';
  document.getElementById('heroFighter').className = 'fighter';
  document.getElementById('monsterFighter').className = 'fighter';
}

// ============================================================
// ANSWER
// ============================================================
function answer(idx){
  if(state.answered) return;
  state.answered = true;
  const q = QUESTIONS[state.currentQ];
  const correct = idx === q.correct;
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => b.disabled = true);

  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if(!correct) btns[q.correct].classList.add('correct');

  if(correct){
    state.score += 10;
    state.correct += 1;
    document.getElementById('heroImg').src = 'images/monkey_win.png';
    document.getElementById('heroFighter').className = 'fighter attack';
    document.getElementById('monsterFighter').className = 'fighter hit';
    document.getElementById('monsterHp').style.width = '0%';
    playTone(880, 0.3);
    setTimeout(()=>playTone(1320, 0.4), 150);
  } else {
    state.hp = Math.max(0, state.hp - 20);
    document.getElementById('heroImg').src = 'images/monkey_think.png';
    document.getElementById('heroFighter').className = 'fighter hit';
    document.getElementById('monsterFighter').className = 'fighter attack';
    document.getElementById('heroHp').style.width = state.hp + '%';
    document.getElementById('heroHpText').textContent = state.hp + '/100';
    playTone(220, 0.4);
  }

  // Explanation
  const exp = document.getElementById('explanation');
  exp.textContent = (correct ? '✅ 答啱！' : '❌ 答錯咗 ') + q.explain;
  exp.classList.add('show');

  // Next
  const nb = document.getElementById('nextBtn');
  nb.classList.add('show');
  setTimeout(() => nb.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

function nextQuestion(){
  state.currentQ += 1;
  if(state.hp <= 0 || state.currentQ >= QUESTIONS.length){
    endGame();
    return;
  }
  loadQuestion();
}

// ============================================================
// END
// ============================================================
function endGame(){
  bgMusic.stop();
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const won = state.hp > 0 && state.correct >= 6;
  bgMusic.play(won ? 'victory' : 'defeat');
  document.getElementById('endTitle').textContent = won ? '🎉 取經成功！' : '💔 戰敗了...';
  document.getElementById('endChar').src = won ? 'images/monkey_win.png' : 'images/monkey_think.png';

  // Coins: 1 coin per 3 correct answers, cap 3
  const coins = Math.min(3, Math.floor(state.correct/3));
  ['coin1','coin2','coin3'].forEach((id,i)=>{
    const el = document.getElementById(id);
    if(i < coins){ setTimeout(()=>el.classList.add('earned'), 300 + i*200); }
    else el.classList.remove('earned');
  });

  document.getElementById('stats').innerHTML =
    '✅ 答啱：<b>'+state.correct+' / '+QUESTIONS.length+'</b> 題<br>' +
    '💯 分數：<b>'+state.score+' 分</b><br>' +
    '⏱️ 時間：<b>'+Math.floor(elapsed/60)+' 分 '+(elapsed%60)+' 秒</b><br>' +
    '🪙 金幣：<b>'+coins+' / 3 枚</b>';

  // Report to parent (index.html)
  try {
    window.parent.postMessage({type:'gameScore',game:'game1',score:state.score,correct:state.correct,total:QUESTIONS.length,coins:coins}, '*');
  } catch(e){}

  showScreen('endScreen');
}

// ============================================================
// BG MUSIC (MP3 files)
// ============================================================
const bgMusic = (() => {
  const tracks = {};
  let current = null, muted = false;

  function init(){
    tracks.intro  = document.getElementById('bgmIntro');
    tracks.battle = document.getElementById('bgmBattle');
    tracks.victory= document.getElementById('bgmVictory');
    tracks.defeat = document.getElementById('bgmDefeat');
    Object.values(tracks).forEach(t => { if(t) t.volume = 0.4; });
  }

  return {
    start(){ init(); this.play('battle'); },
    play(name){
      if(current){ current.pause(); current.currentTime=0; }
      current = tracks[name];
      if(current && !muted) current.play().catch(()=>{});
    },
    stop(){ if(current){ current.pause(); current.currentTime=0; current=null; } },
    toggle(){
      muted = !muted;
      if(current){ if(muted) current.pause(); else current.play().catch(()=>{}); }
      document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
    }
  };
})();

document.getElementById('muteBtn').onclick = () => bgMusic.toggle();

function playTone(freq, dur){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.frequency.value = freq; o.type='triangle';
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur);
    setTimeout(()=>ctx.close(), (dur+0.1)*1000);
  } catch(e){}
}
</script>
