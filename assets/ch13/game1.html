<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>第13課 · 遊戲 1 — 小數點迷宮（西天取經路）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{
  background:linear-gradient(to bottom,rgba(20,5,40,0.7),rgba(60,20,80,0.85)),
    url('images/bg_mountain.png') center/cover no-repeat;
  color:#fff5e6;min-height:100vh;display:flex;flex-direction:column;
}

.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center;overflow-y:auto}
.screen.active{display:flex}

/* ===== START SCREEN ===== */
#startScreen h1{
  font-family:'Noto Serif TC',serif;font-size:clamp(26px,6vw,52px);color:#FFD700;
  text-shadow:0 0 25px rgba(255,215,0,0.7);margin-bottom:8px;font-weight:900;
}
#startScreen h2{font-size:clamp(15px,3vw,22px);color:#f5c76a;margin-bottom:18px}
#startScreen .hero{width:min(280px,55vw);height:auto;margin:14px 0;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#startScreen .intro{
  max-width:460px;font-size:clamp(13px,2.5vw,15px);line-height:1.7;
  background:rgba(0,0,0,0.55);padding:14px 18px;border-radius:14px;
  border:1px solid rgba(255,215,0,0.35);margin-bottom:16px;
}
.btn-start{
  font-size:clamp(17px,3.5vw,22px);padding:13px 32px;font-weight:700;
  background:linear-gradient(135deg,#FFD700,#FF8C00);color:#2a1400;
  border:none;border-radius:28px;cursor:pointer;
  box-shadow:0 6px 18px rgba(255,140,0,0.5);transition:all 0.2s;
}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(255,140,0,0.7)}
.btn-start:active{transform:translateY(0)}

/* ===== MAZE SCREEN ===== */
#mazeScreen{justify-content:flex-start;padding:8px}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;
  max-width:680px;background:rgba(0,0,0,0.55);padding:8px 14px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);margin-bottom:10px;font-weight:700;flex-wrap:wrap;gap:8px}
.hud .item{display:flex;flex-direction:column;align-items:center;font-size:11px;color:#f5c76a}
.hud .v{font-size:18px;color:#FFD700;font-weight:900;line-height:1}
.lives{display:flex;gap:3px}
.lives .lamp{font-size:18px;filter:drop-shadow(0 0 4px gold)}
.lives .lamp.lost{filter:grayscale(1) opacity(0.3)}

/* Maze map */
.map-strip{display:flex;align-items:center;justify-content:center;gap:3px;
  width:100%;max-width:680px;margin-bottom:8px;flex-wrap:wrap}
.map-strip .cell{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,0.2)}
.map-strip .cell.done{background:linear-gradient(135deg,#43A047,#2E7D32);border-color:#1B5E20}
.map-strip .cell.current{background:linear-gradient(135deg,#FFD700,#FF8C00);
  border-color:#fff;animation:pulse 1.2s infinite;box-shadow:0 0 12px gold}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.map-strip .cell.locked{opacity:0.45}
.map-strip .arrow{color:#FFD700;font-size:14px;align-self:center}

/* Room scene */
.room{position:relative;width:100%;max-width:680px;
  background:linear-gradient(135deg,rgba(0,0,0,0.6),rgba(40,20,80,0.7));
  border:2px solid rgba(255,215,0,0.4);border-radius:16px;padding:14px;
  margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,0.6);min-height:120px}
.room-bg{position:absolute;inset:0;border-radius:14px;opacity:0.25;pointer-events:none;
  background-size:cover;background-position:center}
.room-content{position:relative;z-index:2}
.room-title{font-size:clamp(13px,2.5vw,16px);color:#FFD700;font-weight:900;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;justify-content:center}
.room-title .room-emoji{font-size:22px}
.room-character{display:flex;align-items:center;justify-content:center;margin:6px 0}
.room-character img{width:min(75px,14vw);height:auto;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))}
.q-text{font-size:clamp(16px,3.5vw,22px);font-weight:900;color:#fff;margin:8px 0 4px;
  background:rgba(0,0,0,0.5);padding:10px 14px;border-radius:10px;border:1px solid rgba(255,215,0,0.3)}
.hint-msg{font-size:13px;color:#FFD54F;font-style:italic;min-height:18px;margin-top:6px}

/* Doorway choices */
.doors{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;
  max-width:680px;margin-bottom:10px}
@media(min-width:480px){.doors{grid-template-columns:repeat(4,1fr)}}
.door{padding:13px 8px;background:linear-gradient(135deg,#673AB7,#4A148C);
  border:2px solid rgba(255,215,0,0.5);border-radius:14px;cursor:pointer;
  transition:all 0.2s;font-weight:700;color:#fff;text-align:center;font-size:clamp(13px,2.5vw,16px)}
.door:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 6px 16px rgba(255,215,0,0.4);
  background:linear-gradient(135deg,#7E57C2,#5E35B1)}
.door:active{transform:translateY(0)}
.door .arrow-icon{font-size:24px;display:block;margin-bottom:4px;color:#FFD700}
.door .ans-val{font-size:clamp(15px,3vw,18px);font-weight:900;color:#FFD700}
.door:disabled{cursor:not-allowed;opacity:0.55}
.door.right{background:linear-gradient(135deg,#43A047,#2E7D32);animation:doorOpen 0.6s}
.door.wrong{background:linear-gradient(135deg,#F44336,#C62828);animation:doorShake 0.4s}
@keyframes doorOpen{0%{transform:scale(1)}50%{transform:scale(1.15);box-shadow:0 0 30px gold}100%{transform:scale(1)}}
@keyframes doorShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.explanation{display:none;font-size:13px;line-height:1.55;background:rgba(255,215,0,0.18);
  padding:10px 14px;border-radius:10px;border:1px solid rgba(255,215,0,0.5);color:#FFD54F;
  margin-bottom:10px;width:100%;max-width:680px;text-align:left}
.explanation.show{display:block;animation:fadeIn 0.4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.next-btn{display:none;font-size:16px;padding:11px 26px;font-weight:700;
  background:linear-gradient(135deg,#43A047,#2E7D32);color:white;border:none;
  border-radius:24px;cursor:pointer;box-shadow:0 4px 12px rgba(67,160,71,0.5)}
.next-btn.show{display:inline-block;animation:popIn 0.4s}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* ===== END SCREEN ===== */
#endScreen{justify-content:flex-start;padding-top:14px}
.end-title{font-family:'Noto Serif TC',serif;font-size:clamp(28px,6vw,44px);color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,0.6);margin-bottom:10px;font-weight:900}
.end-character{width:min(180px,40vw);margin:10px 0;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5))}
.coins-row{display:flex;justify-content:center;gap:14px;margin:14px 0}
.coins-row .coin-img{width:50px;height:50px;filter:drop-shadow(0 0 12px gold);
  animation:coinFlip 1s ease-out;opacity:0}
.coins-row .coin-img.show{opacity:1}
.coins-row .coin-img.bw{filter:grayscale(1) opacity(0.35)}
@keyframes coinFlip{0%{transform:rotateY(0deg) scale(0.3)}100%{transform:rotateY(720deg) scale(1)}}
.stats{font-size:15px;line-height:1.8;background:rgba(0,0,0,0.5);padding:12px 18px;
  border-radius:12px;border:1px solid rgba(255,215,0,0.3);margin-bottom:14px}
.stats b{color:#FFD700}
.end-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* Header backlink */
.back-link{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.5);
  color:#FFD700;padding:5px 12px;border-radius:8px;font-size:13px;text-decoration:none;
  border:1px solid rgba(255,215,0,0.3);z-index:100}
</style>
</head>

<!-- Game BGM (auto-injected 2026-05-05 fix Bug #5) -->
<audio id="bgmGame" src="../common/audio/game/bgm_battle.mp3" loop preload="auto"></audio>
<button id="bgmToggle" onclick="toggleBgm()" title="開／關背景音樂" style="position:fixed;top:60px;right:14px;z-index:9999;background:white;border:2px solid #FF8F00;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:1.2rem;box-shadow:0 4px 10px rgba(0,0,0,0.15);">🔇</button>
<script>
(function(){
  function toggleBgm(){
    var a=document.getElementById('bgmGame');var b=document.getElementById('bgmToggle');
    if(!a)return;
    if(a.paused){a.play().catch(function(){});b.textContent='🔊';}
    else{a.pause();b.textContent='🔇';}
  }
  window.toggleBgm=toggleBgm;
  // First user interaction triggers BGM autoplay (browser policy)
  function autoStart(){
    var a=document.getElementById('bgmGame');var b=document.getElementById('bgmToggle');
    if(a&&a.paused){a.play().catch(function(){});if(b)b.textContent='🔊';}
    document.removeEventListener('click',autoStart);
    document.removeEventListener('keydown',autoStart);
    document.removeEventListener('touchstart',autoStart);
  }
  document.addEventListener('click',autoStart,{once:true});
  document.addEventListener('keydown',autoStart,{once:true});
  document.addEventListener('touchstart',autoStart,{once:true});
})();
</script>

<script src="../common/wrong-tracker.js"></script>

<script>
// ============================================================
// QUESTION DATA — 10 rooms for 一位小數 × 整數 (Ch13 LO)
// ============================================================
const ROOMS = [
  { emoji:'🏔️', name:'山道密室', char:'monkey_a',
    q:'0.3 × 4 = ?', options:['0.12','1.2','12','4.3'], correct:1,
    explain:'3 × 4 = 12，一位小數所以答案 = 1.2' },
  { emoji:'🌲', name:'森林岔路', char:'tang_monk',
    q:'0.5 × 6 = ?', options:['30','3.0','0.3','60'], correct:1,
    explain:'5 × 6 = 30，一位小數 → 3.0（即 3）' },
  { emoji:'🪨', name:'石窟暗道', char:'pigsy',
    q:'1.2 × 3 = ?', options:['3.6','0.36','36','3.06'], correct:0,
    explain:'12 × 3 = 36，一位小數所以答案 = 3.6' },
  { emoji:'🌊', name:'流沙河岸', char:'sandy',
    q:'0.7 × 8 = ?', options:['56','5.6','0.56','4.8'], correct:1,
    explain:'7 × 8 = 56，一位小數 → 5.6' },
  { emoji:'🔥', name:'火焰山口', char:'monkey_casting',
    q:'2.5 × 4 = ?', options:['10','1','100','2.54'], correct:0,
    explain:'25 × 4 = 100，一位小數 → 10.0 = 10（整數時可省去 .0）' },
  { emoji:'🌙', name:'月光神殿', char:'tang_monk_praying',
    q:'0.9 × 5 = ?', options:['45','4.5','0.45','5.9'], correct:1,
    explain:'9 × 5 = 45，一位小數 → 4.5' },
  { emoji:'⚡', name:'雷電靈洞', char:'monkey_battle',
    q:'3.4 × 2 = ?', options:['6.8','0.68','68','3.42'], correct:0,
    explain:'34 × 2 = 68，一位小數 → 6.8' },
  { emoji:'🍓', name:'士多啤梨園', char:'pigsy',
    q:'每條士多啤梨 0.8 元，買 7 條要幾多錢？', options:['$5.6','$0.56','$56','$7.8'], correct:0,
    explain:'0.8 × 7 = 5.6（元），一位小數' },
  { emoji:'🎋', name:'青竹繩橋', char:'sandy',
    q:'一條繩子長 4.2 米，5 條總長度？', options:['$21','21米','2.1米','210米'], correct:1,
    explain:'4.2 × 5 = 21.0 = 21 米' },
  { emoji:'🏯', name:'西天靈山', char:'monkey_win',
    q:'最後一關：0.6 × 9 = ?', options:['5.4','0.54','54','6.9'], correct:0,
    explain:'6 × 9 = 54，一位小數 → 5.4 ✨ 你已到達西天！' },
];

// ============================================================
// STATE
// ============================================================
let state = { currentRoom: 0, score: 0, lives: 3, mistakes: 0, startTime: 0, answered: false };

const ARROWS = ['⬆️', '⬇️', '⬅️', '➡️'];
const BG_IMAGES = ['battle_bg.png', 'bg_mountain.png'];

// ============================================================
// SCREEN MGMT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// START / RESTART
// ============================================================
function startGame() {
  state = { currentRoom: 0, score: 0, lives: 3, mistakes: 0, startTime: Date.now(), answered: false };
  showScreen('mazeScreen');
  loadRoom();
}

function restartGame() {
  showScreen('startScreen');
}

// ============================================================
// LOAD ROOM (current cell)
// ============================================================
function loadRoom() {
  const room = ROOMS[state.currentRoom];
  if (!room) { endGame(true); return; }
  state.answered = false;

  // HUD
  document.getElementById('progressTxt').textContent = (state.currentRoom + 1) + ' / ' + ROOMS.length;
  document.getElementById('scoreTxt').textContent = state.score;
  const lampsHtml = [0,1,2].map(i => `<span class="lamp${i >= state.lives ? ' lost' : ''}">🕯️</span>`).join('');
  document.getElementById('livesBox').innerHTML = lampsHtml;

  // Map strip
  let mapHtml = '';
  for (let i = 0; i < ROOMS.length; i++) {
    let cls = 'cell';
    if (i < state.currentRoom) cls += ' done';
    else if (i === state.currentRoom) cls += ' current';
    else cls += ' locked';
    mapHtml += `<div class="${cls}">${i < state.currentRoom ? '✓' : (i === state.currentRoom ? ROOMS[i].emoji : '🔒')}</div>`;
    if (i < ROOMS.length - 1) mapHtml += `<span class="arrow">→</span>`;
  }
  document.getElementById('mapStrip').innerHTML = mapHtml;

  // Room
  document.getElementById('roomEmoji').textContent = room.emoji;
  document.getElementById('roomName').textContent = `第 ${state.currentRoom + 1} 房 · ${room.name}`;
  document.getElementById('roomChar').src = `images/${room.char}.png`;
  document.getElementById('roomChar').onerror = function(){ this.style.display = 'none'; };
  document.getElementById('qText').textContent = room.q;
  document.getElementById('hintMsg').textContent = '';
  document.getElementById('roomBg').style.backgroundImage = `url('images/${BG_IMAGES[state.currentRoom % BG_IMAGES.length]}')`;

  // Doors
  const doors = document.getElementById('doors');
  doors.innerHTML = '';
  room.options.forEach((opt, i) => {
    const door = document.createElement('button');
    door.className = 'door';
    door.innerHTML = `<span class="arrow-icon">${ARROWS[i]}</span><span class="ans-val">${opt}</span>`;
    door.onclick = () => chooseDoor(i);
    doors.appendChild(door);
  });

  // Reset explanation + next btn
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

// ============================================================
// CHOOSE DOOR
// ============================================================
function chooseDoor(idx) {
  if (state.answered) return;
  state.answered = true;
  const room = ROOMS[state.currentRoom];
  const doors = document.querySelectorAll('.door');
  doors.forEach((d, i) => {
    d.disabled = true;
    if (i === idx) d.classList.add(idx === room.correct ? 'right' : 'wrong');
    if (idx !== room.correct && i === room.correct) d.classList.add('right');
  });

  if (idx === room.correct) {
    state.score += 10;
    document.getElementById('hintMsg').textContent = '🚪 門打開咗！';
    document.getElementById('explanation').innerHTML = `✅ 正確！<br>${room.explain}`;
    document.getElementById('explanation').classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
  } else {
    state.mistakes++;
    state.lives--;
    // Update lives display immediately (UX)
    const lampsHtml = [0,1,2].map(i => `<span class="lamp${i >= state.lives ? ' lost' : ''}">🕯️</span>`).join('');
    document.getElementById('livesBox').innerHTML = lampsHtml;
    document.getElementById('hintMsg').textContent = '❌ 揀錯門！再睇清楚算式';

    // Track wrong (Supabase)
    if (window.LWWFWrong) {
      window.LWWFWrong.record({
        chapter: 13,
        question: room.q,
        correct_answer: room.options[room.correct],
        student_answer: room.options[idx],
        source: 'game1',
      }).catch(() => null);
    }

    document.getElementById('explanation').innerHTML = `❌ 揀錯咗！正確答案：<b>${room.options[room.correct]}</b><br>${room.explain}<br>💡 用呢個提示再衝下一關`;
    document.getElementById('explanation').classList.add('show');

    if (state.lives <= 0) {
      // Game over
      setTimeout(() => endGame(false), 1500);
    } else {
      document.getElementById('nextBtn').classList.add('show');
      document.getElementById('nextBtn').textContent = '繼續前進（已扣 1 命）➜';
    }
  }
}

// ============================================================
// ADVANCE
// ============================================================
function advanceRoom() {
  state.currentRoom++;
  document.getElementById('nextBtn').textContent = '推門前進 ➜';
  if (state.currentRoom >= ROOMS.length) {
    endGame(true);
  } else {
    loadRoom();
  }
}

// ============================================================
// END GAME
// ============================================================
function endGame(victory) {
  showScreen('endScreen');

  const elapsed = Math.round((Date.now() - state.startTime) / 1000);
  const correct = ROOMS.length - state.mistakes;
  const correctRate = Math.round((correct / ROOMS.length) * 100);

  // Coins: 3 if 0 mistakes, 2 if 1, 1 if 2, 0 if 3
  let coins = 0;
  if (victory) {
    if (state.mistakes === 0) coins = 3;
    else if (state.mistakes === 1) coins = 2;
    else coins = 1;
  }
  // Show coins
  ['coin1','coin2','coin3'].forEach((id, i) => {
    const c = document.getElementById(id);
    c.classList.toggle('show', true);
    c.classList.toggle('bw', i >= coins);
  });

  document.getElementById('endTitle').textContent = victory ? '🏆 到達西天！' : '😢 迷宮迷失了';
  document.getElementById('endChar').src = `images/${victory ? 'monkey_win' : 'monkey_think'}.png`;
  document.getElementById('endChar').onerror = function(){ this.style.display = 'none'; };

  document.getElementById('stats').innerHTML = `
    <div><b>得分：</b>${state.score} 分</div>
    <div><b>正確：</b>${correct} / ${ROOMS.length} (${correctRate}%)</div>
    <div><b>失誤：</b>${state.mistakes} 次</div>
    <div><b>用時：</b>${elapsed} 秒</div>
    <div><b>金幣：</b>${coins} / 3</div>
  `;

  // Save progress
  try {
    const k = (() => {
      try {
        const u = JSON.parse(localStorage.getItem('lwwf_auth_user') || 'null');
        if (u && u.class && u.number) return `progress_ch13_${u.class}_${u.number}`;
      } catch (e) {}
      return 'progress_ch13';
    })();
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p.game1 = Object.assign(p.game1 || {}, {
      done: victory, ts: Date.now(), score: state.score,
      coins, correct, total: ROOMS.length, mistakes: state.mistakes,
    });
    localStorage.setItem(k, JSON.stringify(p));
  } catch (e) {}
}
</script>
</body>
</html>
