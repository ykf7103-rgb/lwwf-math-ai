<div class="wrap">

    1. 細閱問題（卡正面）<br>
    2. 點一下卡來揭曉答案（卡背面）<br>

<script>
const data = JSON.parse(document.getElementById('flashcardsData').textContent);
const cards = data.cards || [];
let idx = 0;
let flipped = false;

function render(){
  const c = cards[idx];
  if (!c) return;
  document.getElementById('cardLabel').textContent = flipped ? '答案' : '問題';
  document.getElementById('cardContent').textContent = flipped ? c.back : c.front;
  document.getElementById('card').classList.toggle('flipped', flipped);
  document.getElementById('progressTxt').textContent = (idx+1) + ' / ' + cards.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === cards.length - 1;
}
function flipCard(){ flipped = !flipped; render(); }
function prev(){ if (idx > 0){ idx--; flipped=false; render(); } }
function next(){ if (idx < cards.length - 1){ idx++; flipped=false; render(); } }

document.getElementById('totalCards').textContent = cards.length;
render();
</script>
