<style>

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .q-card.wrong-ans { border-left-color: #F44336; background: #FFEBEE; }
  .q-num { font-size: 0.78rem; color: #E65100; font-weight: 800; margin-bottom: 4px; }

  .opt:hover:not(:disabled) { border-color: #FF9800; background: #FFF3E0; }
  .opt.selected { background: #FFE0B2; border-color: #F57C00; }
  .opt.correct { background: #C8E6C9; border-color: #4CAF50; color: #2E7D32; }
  .opt.correct .letter { background: #4CAF50; color: white; }

  .lock-modal.show { display: flex; }
  .lock-box { background: linear-gradient(135deg, #FF5252, #C62828); color: white; padding: 28px 22px; border-radius: 18px; max-width: 420px; text-align: center; }
  .lock-box .big { font-size: 3.5rem; margin-bottom: 6px; }
  .lock-box button { background: white; color: #C62828; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 8px; font-family: inherit; font-size: 1rem; }
  @media (max-width: 600px) { .slide-opts, .opts { grid-template-columns: 1fr !important; } .slide-q-text, .q-text { font-size: 1rem; } .slide-opt, .opt { font-size: 0.9rem; padding: 10px; } }
</style>

<body>
<header>
  <h1>✏️ 第14課 · 評估 1 — 一位小數 × 一位小數</h1>
  <a href="index.html" class="back">← 返回第13課</a>
</header>

<div class="wrap">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="slides" onclick="switchMode('slides')"><span class="emoji">📊</span> 簡報評估</button>
    <button class="mode-tab" data-mode="list" onclick="switchMode('list')"><span class="emoji">⚡</span> 快速 MC</button>
  </div>

  <!-- ===== MODE A: Slide with Q→A flow ===== -->
  <div class="mode-panel active" id="slidesPanel">
    <div class="slide-wrap">
      <div class="slide-stats">
        <div class="stat"><div class="label">題目</div><div class="val" id="slideQNum">1 / 6</div></div>
        <div class="stat"><div class="label">答對</div><div class="val" id="slideCorrect" style="color:#2E7D32">0</div></div>
        <div class="stat"><div class="label">連錯</div><div class="val" id="slideWrongs" style="color:#C62828">0</div></div>
      </div>
      <div class="slide-progress"><div class="slide-progress-fill" id="slidePfill"></div></div>

      <div style="text-align:center;margin-bottom:6px;">
        <span class="phase-badge" id="phaseBadge">📖 題目頁</span>
      </div>

      <div class="slide-img-wrap"><img class="slide-img" id="slideImg" src="pages/assess1_p01.jpg" alt="題目圖片" /></div>

      <div class="slide-q" id="slideQBox">
        <div class="slide-q-num" id="slideQLabel">第 1 題</div>
        <div class="slide-q-text" id="slideQText"></div>
        <div class="slide-opts" id="slideOpts"></div>
        <div class="slide-explain" id="slideExplain" style="display:none;">
          <div class="title" id="slideExplainTitle"></div>
          <div class="body" id="slideExplainBody"></div>
        </div>
      </div>

      <div class="wrongs-note" id="wrongsNote"></div>

      <div class="slide-nav">
        <button class="slide-btn" id="slidePrev" onclick="slidePrev()" disabled>◀ 上一題</button>
        <button class="slide-btn next-btn" id="slideNext" onclick="slideNext()" disabled>答咗先過 ▶</button>
      </div>
    </div>
  </div>

  <!-- ===== MODE B: List ===== -->
  <div class="mode-panel" id="listPanel">
    <div class="stats-row">
      <div class="stat"><div class="label">題目</div><div class="val" id="totalStat" style="text-align:center;font-size:1.3rem;font-weight:900;color:#E65100">6</div></div>
      <div class="stat"><div class="label">已答</div><div class="val" id="answeredStat" style="text-align:center;font-size:1.3rem;font-weight:900;color:#1565C0">0</div></div>
      <div class="stat"><div class="label">答對</div><div class="val" id="correctStat" style="text-align:center;font-size:1.3rem;font-weight:900;color:#2E7D32">0</div></div>
    </div>
    <div id="qList"></div>
    <button class="btn-submit-all" id="submitBtn" onclick="submitAll()" disabled>先做晒全部 6 題</button>
  </div>

  <div class="final-screen" id="finalScreen">
    <div class="trophy" id="finalTrophy">🏆</div>
    <div>評估 1 完成！</div>
    <div class="score-big"><span id="finalScore">0</span> / 6</div>
    <p id="finalMsg" style="margin:10px 0;"></p>
    <div>
      <button class="btn" onclick="location.reload()">🔁 再做一次</button>
      <a href="game1.html" class="btn">🎮 玩遊戲 1</a>
      <a href="index.html" class="btn">🏠 返入口</a>
    </div>
  </div>
</div>

<div class="lock-modal" id="lockModal">
  <div class="lock-box">
    <div class="big">🔒</div>
    <h2 style="margin:4px 0 10px;">錯得多，要重做！</h2>
    <p>連錯 5 次，評估重新開始，睇清楚圖再答 💪</p>
    <button onclick="resetSlides()">🔁 由第 1 題重新開始</button>
  </div>
</div>

<script>
const CHAPTER = 14, DECK_KEY = 'assess1', IMG_PREFIX = 'assess1';

// Ch14 Section 1 (天庭點心閣) · 真實 NLM JPG 題目（6 題 Q-A 交替）
// p01=封面, p02=任務規則, p03-p14=6 對 Q-A
const Q = [
  { q: '【第一關：八戒的燒賣帳單】八戒點了 3.5 籠蟹黃燒賣，每籠售價 1.2 個仙幣。共需付多少仙幣？', opts: ['4.2 仙幣','0.42 仙幣','42 仙幣','4.20 仙幣'], a: 0, hint: '3.5 × 1.2 = ? 先算 35 × 12 = 420，一位+一位=兩位小數 → 4.20，末尾 0 要簡化 → 4.2 仙幣', pageQ: 3, pageA: 4 },
  { q: '【第二關：沙僧的麵粉重量】特級麵粉每袋重 0.8 公斤，沙僧拿了 0.7 袋。共拿了多少公斤？', opts: ['0.56 公斤','5.6 公斤','0.056 公斤','1.5 公斤'], a: 0, hint: '0.8 × 0.7 = ? 8 × 7 = 56，一位+一位 = 兩位小數 → 0.56 公斤', pageQ: 5, pageA: 6 },
  { q: '【第三關：整數的偽裝】悟空買了 2.5 塊蟠桃派，每塊重 0.4 斤。總重多少斤？', opts: ['1 斤（= 1.00）','1.0 斤','10 斤','0.1 斤'], a: 0, hint: '2.5 × 0.4：25 × 4 = 100，一位+一位=兩位小數 → 1.00，可以簡化做 1 斤（整數偽裝）', pageQ: 7, pageA: 8 },
  { q: '【第四關：龍王的茶水】小茶杯容量 0.2 公升，八戒喝了 0.3 杯。喝了多少公升？', opts: ['0.5 公升','0.06 公升','0.6 公升','0.006 公升'], a: 1, hint: '0.2 × 0.3：2 × 3 = 6，兩個一位小數 → 0.06 公升（係兩位小數，唔係一位！）', pageQ: 9, pageA: 10 },
  { q: '【第五關：超級大宴估算】他們打包 8.9 盒蓮蓉包，每盒 5.1 仙幣。估算最接近？', opts: ['約 45 仙幣','約 40 仙幣','約 50 仙幣','約 100 仙幣'], a: 0, hint: '估算：8.9 ≈ 9，5.1 ≈ 5，9 × 5 = 45。實際 8.9 × 5.1 = 45.39，接近 45 仙幣。', pageQ: 11, pageA: 12 },
  { q: '【第六關：妖怪的考驗】下列哪個算式嘅答案係「整數」（可簡化為整數）？', opts: ['1.5 × 1.2 = 1.80','0.5 × 0.8 = 0.40','2.5 × 0.8 = 2.00','全部都係兩位小數'], a: 2, hint: '1.5×1.2=1.8（一位小數）；0.5×0.8=0.4（一位小數）；2.5×0.8=2.00=2（整數！）。只有 C 答案簡化後係整數。', pageQ: 13, pageA: 14 }
];

function pad2(n){ return String(n).padStart(2,'0'); }
function switchMode(mode) { document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode)); document.getElementById('slidesPanel').classList.toggle('active', mode === 'slides'); document.getElementById('listPanel').classList.toggle('active', mode === 'list'); if (mode === 'list' && !listRendered) { renderList(); listRendered = true; } }

// ==== Mode A: Slide with Q→A phases ====
let slideIdx = 0;                           // current question (0-5)
let slidePhase = 'question';                // 'question' or 'answer'
let slideCorrect = 0;
let slideWrongs = 0;
const slideAnswered = new Array(Q.length).fill(null);  // stores chosen idx

function renderSlide() {
  const q = Q[slideIdx];
  const pageNum = slidePhase === 'question' ? q.pageQ : q.pageA;
  document.getElementById('slideImg').src = `pages/${IMG_PREFIX}_p${pad2(pageNum)}.jpg`;
  document.getElementById('slideQNum').textContent = `${slideIdx+1} / ${Q.length}`;
  document.getElementById('slideQLabel').textContent = `第 ${slideIdx+1} 題`;
  document.getElementById('slideCorrect').textContent = slideCorrect;
  document.getElementById('slideWrongs').textContent = slideWrongs;
  document.getElementById('slidePfill').style.width = Math.round((slideIdx + (slidePhase==='answer'?0.5:0) + 0.5) / Q.length * 100) + '%';

  // Phase badge
  const badge = document.getElementById('phaseBadge');
  if (slidePhase === 'question') {
    badge.className = 'phase-badge question'; badge.textContent = '📖 題目頁（讀完再作答）';
  } else {
    badge.className = 'phase-badge answer'; badge.textContent = '✅ 答案頁（核對 + 筆記）';
  }

  // Question text + options
  document.getElementById('slideQText').textContent = q.q;
  const optsDiv = document.getElementById('slideOpts');
  optsDiv.innerHTML = '';
  // Adapt grid columns: 3-option questions use 3-col layout
  optsDiv.classList.toggle('three-cols', q.opts.length === 3);
  const chosen = slideAnswered[slideIdx];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'slide-opt';
    btn.innerHTML = `<span class="letter">${['A','B','C','D'][i]}</span><span>${opt}</span>`;
    if (chosen !== null) {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === chosen) btn.classList.add('wrong');
    } else {
      btn.onclick = () => slidePick(i);
    }
    optsDiv.appendChild(btn);
  });

  // Explain box
  const explain = document.getElementById('slideExplain');
  if (chosen !== null && slidePhase === 'answer') {
    explain.style.display = 'block';
    const correct = chosen === q.a;
    explain.className = 'slide-explain ' + (correct ? 'correct-box' : 'wrong-box');
    document.getElementById('slideExplainTitle').textContent = correct ? '✅ 答啱！大聖都讚你叻！' : `❌ 你揀咗 ${['A','B','C','D'][chosen]}，正解係 ${['A','B','C','D'][q.a]}. ${q.opts[q.a]}`;
    document.getElementById('slideExplainBody').innerHTML = `💡 <b>大聖筆記：</b>${q.hint}`;
  } else {
    explain.style.display = 'none';
  }

  // Nav buttons
  document.getElementById('slidePrev').disabled = slideIdx === 0 && slidePhase === 'question';
  const nb = document.getElementById('slideNext');
  nb.className = 'slide-btn next-btn';
  if (chosen === null) {
    nb.disabled = true;
    nb.textContent = '答咗先過 ▶';
  } else if (slidePhase === 'question') {
    nb.disabled = false;
    nb.textContent = '睇答案 ✓';
  } else if (slideIdx === Q.length - 1) {
    nb.disabled = false;
    nb.className = 'slide-btn done-btn';
    nb.textContent = '🎉 睇結果';
  } else {
    nb.disabled = false;
    nb.textContent = '下一題 ▶';
  }

  document.getElementById('wrongsNote').textContent = slideWrongs >= 3 ? `⚠️ 已連錯 ${slideWrongs} 次（錯 5 次要由頭做）` : '';
}

function slidePick(i) {
  if (slideAnswered[slideIdx] !== null) return;
  const q = Q[slideIdx];
  slideAnswered[slideIdx] = i;
  if (i === q.a) { slideCorrect++; slideWrongs = 0; }
  else { slideWrongs++; }
  renderSlide();
  if (slideWrongs >= 5) setTimeout(() => document.getElementById('lockModal').classList.add('show'), 800);
}

function slidePrev() {
  // Go back: from answer → question of same idx; from question → answer of prev idx
  if (slidePhase === 'answer') { slidePhase = 'question'; renderSlide(); }
  else if (slideIdx > 0) {
    slideIdx--;
    slidePhase = slideAnswered[slideIdx] !== null ? 'answer' : 'question';
    renderSlide();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function slideNext() {
  if (slideAnswered[slideIdx] === null) return;
  if (slidePhase === 'question') {
    slidePhase = 'answer';
    renderSlide();
    window.scrollTo({top:0, behavior:'smooth'});
  } else if (slideIdx < Q.length - 1) {
    slideIdx++;
    slidePhase = 'question';
    renderSlide();
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    showFinal(slideCorrect);
  }
}

function resetSlides() {
  slideIdx = 0; slidePhase = 'question'; slideCorrect = 0; slideWrongs = 0;
  slideAnswered.fill(null);
  document.getElementById('lockModal').classList.remove('show');
  renderSlide();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ==== Mode B: List ====
let listRendered = false;
const selected = new Array(Q.length).fill(-1);
let listSubmitted = false;

function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  Q.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    let html = `<div class="q-num">第 ${i+1} 題</div><div class="q-text">${q.q}</div><div class="opts${q.opts.length===3?' three-cols':''}" id="opts${i}">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="opt${selected[i]===oi?' selected':''}" onclick="pickList(${i},${oi})"><span class="letter">${['A','B','C','D'][oi]}</span><span>${opt}</span></button>`;
    });
    html += `</div>`;
    card.innerHTML = html;
    list.appendChild(card);
  });
  updateListStats();
}

function pickList(qIdx, optIdx) {
  if (listSubmitted) return;
  selected[qIdx] = optIdx;
  document.querySelectorAll(`#opts${qIdx} .opt`).forEach((b, i) => b.classList.toggle('selected', i === optIdx));
  updateListStats();
}

function updateListStats() {
  const ans = selected.filter(s => s !== -1).length;
  document.getElementById('answeredStat').textContent = ans;
  const btn = document.getElementById('submitBtn');
  if (ans === Q.length) { btn.disabled = false; btn.textContent = '✓ 提交答案 (檢查成績)'; }
  else { btn.disabled = true; btn.textContent = `仲有 ${Q.length - ans} 題未做`; }
}

function submitAll() {
  listSubmitted = true;
  let correct = 0;
  Q.forEach((q, i) => {
    const card = document.getElementById('qList').children[i];
    const btns = card.querySelectorAll('.opt');
    btns.forEach((b, oi) => {
      b.disabled = true;
      if (oi === q.a) b.classList.add('correct');
      else if (selected[i] === oi) b.classList.add('wrong');
    });
    if (selected[i] === q.a) { correct++; card.classList.add('correct-ans'); }
    else {
      card.classList.add('wrong-ans');
      const ex = document.createElement('div');
      ex.className = 'explain show';
      ex.innerHTML = `💡 ${q.hint}`;
      card.appendChild(ex);
    }
  });
  document.getElementById('correctStat').textContent = correct;
  document.getElementById('submitBtn').style.display = 'none';
  showFinal(correct);
}

function showFinal(correct) {
  const f = document.getElementById('finalScreen');
  f.classList.add('show');
  document.getElementById('finalScore').textContent = correct;
  let m, t;
  if (correct === Q.length) { m = '🌟 滿分！點心大廚冇難度！'; t = '🏆'; }
  else if (correct >= 5) { m = '💪 好勁！再溫下錯嘅就完美'; t = '🥇'; }
  else if (correct >= 3) { m = '👍 不錯，記得睇下錯題嘅提示'; t = '🥈'; }
  else { m = '📖 多啲溫習簡報 1，再嚟挑戰'; t = '📚'; }
  document.getElementById('finalMsg').textContent = m;
  document.getElementById('finalTrophy').textContent = t;
  f.scrollIntoView({behavior:'smooth', block:'start'});
  try {
    const k = `progress_ch${CHAPTER}`;
    const p = JSON.parse(localStorage.getItem(k) || '{}');
    p[DECK_KEY] = { done: true, score: correct, total: Q.length, ts: Date.now() };
    localStorage.setItem(k, JSON.stringify(p));
  } catch(e) {}
  try { window.parent.postMessage({ type:'assessScore', deck: DECK_KEY, correct, total: Q.length }, '*'); } catch(e) {}
}

renderSlide();
</script>
<script src="../common/feedback.js"></script>
</body>
