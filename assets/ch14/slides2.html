<style>

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  @media (max-width: 600px) { header h1 { font-size: 0.9rem; } .btn { padding: 8px 12px; font-size: 0.85rem; } .thumb { width: 50px; height: 35px; } .mc-opts { grid-template-columns: 1fr; } }

    <p style="font-size:0.85rem;opacity:0.9">唔使擔心，慢慢睇、睇清楚，你一定做到 💪</p>

<script>
const PREFIX = 'slides2', TOTAL = 14, CHAPTER = 14, DECK_KEY = 'slides2';
// v3 Ch14 Part 2: 兩位小數 × 一位小數 + 估算 + 四捨五入（題目對齊 NLM JPG）
const SLIDE_QUESTIONS = [
  // p03 火眼金睛估算法：題目根據 p02 場景 2.35 × 0.7
  { afterPage:3, type:'mc', pageQ:2, pageA:3, q:'簡報估算：豆沙包重 2.35 公斤，客人只買 0.7 籠，先用估算法判斷，2.35 取至整數約等於多少？', options:['3','2','4','1'], correct:1, hint:'看小數第一位：3 < 5 應捨去；參考火眼金睛估算法' },
  { afterPage:3, type:'fill', pageQ:3, pageA:3, q:'簡報估算：根據火眼金睛估算法，0.7 取至整數約等於多少？', accept:['1','一'], hint:'看小數第一位 7：7 ≥ 5，依四捨五入規律處理' },
  // p04 直式對齊鐵則
  { afterPage:4, type:'mc', pageQ:4, pageA:4, q:'簡報鐵則：列直式 2.35 × 0.7 時，下列哪項排列方法正確？', options:['對齊小數點（如加減法般）','對齊整數位的最高位','左對齊','數字全靠右對齊，先無視小數點'], correct:3, hint:'乘法奧義與加減法的遺毒不同，看 p04 黑板示意' },
  // p05 無視結界連擊（暫當作整數乘）
  { afterPage:5, type:'fill', pageQ:5, pageA:5, q:'簡報練習：把 2.35 × 0.7 暫當作整數，計算 235 × 7 = ?', accept:['1645'], hint:'用平常的整數乘法直接計算，這就是「無視結界連擊」' },
  // p06 小數點歸位之術
  { afterPage:6, type:'mc', pageQ:6, pageA:6, q:'簡報口訣：兩位小數乘以一位小數，積會有多少位小數？', options:['三位小數','二位小數','四位小數','一位小數'], correct:0, hint:'2 + 1 = ?；參考小數點歸位之術' },
  // p09 斬斷虛無之刃：1.25 × 6.4 = 8.000 → 8
  { afterPage:9, type:'mc', pageQ:8, pageA:9, q:'簡報練習：八戒算出 1.25 × 6.4 = 8.000，在橫式答案中應寫成什麼？', options:['8.000','8.0','8','0.8'], correct:2, hint:'橫式中小數點末尾的零可勇敢刪去，看「斬斷虛無之刃」' },
  // p11 四捨五入幻化術：7.65 ≈ 7.7
  { afterPage:11, type:'mc', pageQ:11, pageA:11, q:'簡報練習：將 7.65 取近似值至十分位，等於多少？', options:['8','7.6','7.7','7.65'], correct:2, hint:'看下一位（百分位）數字，依四捨五入法則處理' },
  { afterPage:11, type:'fill', pageQ:11, pageA:11, q:'簡報原理：要取近似值至十分位時，需看哪一位的數字來判斷進退？', accept:['百分位','百份位'], hint:'看比目標位低一位的數字' },
  // p12 進階幻化：2.5976 ≈ 2.60（百分位連鎖反應）
  { afterPage:12, type:'mc', pageQ:12, pageA:12, q:'簡報練習：將 2.5976 取近似值至百分位，正確寫法是？', options:['2.597','2.6','2.59','2.60'], correct:3, hint:'參考「進階幻化」的提示——必須保留百分位的位置，即使是零' },
  // p13 點心閣大挑戰：12.6 × 0.45（取至十分位）
  { afterPage:13, type:'mc', pageQ:13, pageA:13, q:'簡報應用：每公斤麵粉售 12.6 元，沙僧購買 0.45 公斤做點心，需付多少元？（答案取近似值至十分位）', options:['5.7 元','5.6 元','5.67 元','5 元'], correct:0, hint:'先算 12.6 × 0.45 直式，再依四捨五入規律取近似值' },
  // p14 西遊秘笈總結
  { afterPage:14, type:'fill', pageQ:14, pageA:14, q:'📊 綜合評估題：根據西遊秘笈，當題目要求取近似值時，等號會變成什麼符號？', accept:['≈','約等於','大約等於'], hint:'這個符號代表「大約等於」，由唐僧化緣哲學引出' },
  { afterPage:14, type:'mc', pageQ:14, pageA:14, q:'📊 綜合評估題：根據秘笈，「橫式寫答案時，末尾有 0」應如何處理？', options:['加括號','保留','寫成分數','勇敢刪去'], correct:3, hint:'參考八戒的口訣——簡化答案的形式' }
];
let idx = 0;
const slideQuizAnswered = {}, slideQuizWrong = {};
const img=document.getElementById('slide'),ind=document.getElementById('ind'),prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),pfill=document.getElementById('pfill'),doneBanner=document.getElementById('done'),thumbsEl=document.getElementById('thumbs'),quizOv=document.getElementById('quizOv'),quizBody=document.getElementById('quizBody'),wrongNote=document.getElementById('wrongNote'),lockModal=document.getElementById('lockModal');
function pad(n){return String(n).padStart(2,'0');}
function getUnansweredQ(pageNum){const qs=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum);for(let i=0;i<qs.length;i++){const key=pageNum+'_'+i;if(!slideQuizAnswered[key])return{q:qs[i],key,idx:i,pageNum};}return null;}
function buildThumbs(){thumbsEl.innerHTML='';for(let i=0;i<TOTAL;i++){const t=document.createElement('div');t.className='thumb';t.style.backgroundImage=`url('pages/${PREFIX}_p${pad(i+1)}.jpg')`;t.onclick=()=>goto(i);const num=document.createElement('div');num.className='thumb-num';num.textContent=i+1;t.appendChild(num);thumbsEl.appendChild(t);}}
function render(){img.src=`pages/${PREFIX}_p${pad(idx+1)}.jpg`;img.alt=`第 ${idx+1} 頁`;ind.textContent=`${idx+1} / ${TOTAL}`;prevBtn.disabled=idx===0;nextBtn.textContent=idx===TOTAL-1?'完成 ✓':'下一頁 ▶';pfill.style.width=Math.round((idx+1)/TOTAL*100)+'%';
  speakPage(idx + 1);[...thumbsEl.children].forEach((el,i)=>{el.classList.toggle('active',i===idx);const pg=i+1;const hasQ=SLIDE_QUESTIONS.some(q=>q.afterPage===pg);const allAnswered=hasQ&&!getUnansweredQ(pg);el.classList.toggle('answered',allAnswered);});const active=thumbsEl.querySelector('.thumb.active');if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});quizOv.classList.remove('show');if(idx===TOTAL-1){const allDone=!SLIDE_QUESTIONS.some((q,i)=>!slideQuizAnswered[q.afterPage+'_'+SLIDE_QUESTIONS.filter(x=>x.afterPage===q.afterPage).indexOf(q)]);if(allDone){doneBanner.classList.add('show');markDone();}}}
function showQuiz(pageNum){const pageQs=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum);let html='';pageQs.forEach((pq,i)=>{const key=pageNum+'_'+i;const done=slideQuizAnswered[key];const type=pq.type||'mc';const badge=type==='fill'?'<span class="type-badge fill">填充題</span>':'<span class="type-badge mc">選擇題</span>';html+=`<div id="qb${i}" class="quiz-block${done?' done':''}">`;html+=`<div class="q-label">${done?'✅ ':''}第${i+1}題${badge}<br>${pq.q}</div>`;if(done){html+=`<div class="hint-msg correct">✅ 已答啱</div>`;}else if(type==='fill'){html+=`<div class="fill-box"><input type="text" class="fill-input" id="fi${i}" placeholder="輸入答案..."><button class="fill-btn" onclick="checkFill(${i},${pageNum})">提交</button></div>`;html+=`<div class="hint-msg" id="hm${i}"></div>`;}else{html+=`<div class="mc-opts">`;pq.options.forEach((opt,oi)=>{html+=`<button class="mc-opt" data-i="${oi}" onclick="checkMC(${i},${oi},${pageNum})">${['A','B','C','D'][oi]}. ${opt}</button>`;});html+=`</div><div class="hint-msg" id="hm${i}"></div>`;}html+=`</div>`;});quizBody.innerHTML=html;const wrongs=slideQuizWrong[pageNum]||0;wrongNote.textContent=wrongs>0?`⚠️ 呢一頁已錯 ${wrongs} 次（錯 2 次要由頭睇）`:'';quizOv.classList.add('show');setTimeout(()=>{const firstInput=quizBody.querySelector('.fill-input:not([disabled])');if(firstInput)firstInput.focus();},100);quizBody.querySelectorAll('.fill-input').forEach(inp=>{inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const i=inp.id.slice(2);checkFill(parseInt(i),pageNum);}});});}
function checkMC(qIdx,selected,pageNum){const q=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum)[qIdx];const key=pageNum+'_'+qIdx;const block=document.getElementById('qb'+qIdx);const hint=document.getElementById('hm'+qIdx);const btns=block.querySelectorAll('.mc-opt');if(selected===q.correct){btns[selected].classList.add('correct');btns.forEach(b=>b.disabled=true);slideQuizAnswered[key]=true;block.classList.add('done');hint.className='hint-msg correct';hint.innerHTML='✅ 答啱！';autoAdvance(pageNum);}else{btns[selected].classList.add('wrong');btns[selected].disabled=true;hint.className='hint-msg wrong';hint.innerHTML=`❌ 再試！💡 ${q.hint}`;registerWrong(pageNum);}}
function checkFill(qIdx,pageNum){const q=SLIDE_QUESTIONS.filter(x=>x.afterPage===pageNum)[qIdx];const key=pageNum+'_'+qIdx;const input=document.getElementById('fi'+qIdx);const hint=document.getElementById('hm'+qIdx);const block=document.getElementById('qb'+qIdx);const val=input.value.trim();if(!val){input.focus();return;}const normalize=s=>String(s).trim().replace(/\s+/g,'').replace(/，/g,',');const userAns=normalize(val);const correct=(q.accept||[]).some(a=>normalize(a)===userAns);if(correct){input.classList.add('correct');input.disabled=true;slideQuizAnswered[key]=true;block.classList.add('done');hint.className='hint-msg correct';hint.innerHTML='✅ 答啱！';autoAdvance(pageNum);}else{input.classList.remove('wrong');void input.offsetWidth;input.classList.add('wrong');hint.className='hint-msg wrong';hint.innerHTML=`❌ 再試！💡 ${q.hint}`;registerWrong(pageNum);setTimeout(()=>input.classList.remove('wrong'),500);}}
function registerWrong(pageNum){slideQuizWrong[pageNum]=(slideQuizWrong[pageNum]||0)+1;wrongNote.textContent=`⚠️ 呢一頁已錯 ${slideQuizWrong[pageNum]} 次（錯 2 次要由頭睇）`;if(slideQuizWrong[pageNum]>=2){setTimeout(triggerLock,600);}}
function triggerLock(){lockModal.classList.add('show');}
function goBackToStart(){Object.keys(slideQuizAnswered).forEach(k=>delete slideQuizAnswered[k]);Object.keys(slideQuizWrong).forEach(k=>delete slideQuizWrong[k]);lockModal.classList.remove('show');idx=0;render();window.scrollTo({top:0,behavior:'smooth'});}
function autoAdvance(pageNum){setTimeout(()=>{const uq=getUnansweredQ(pageNum);if(!uq){setTimeout(()=>{quizOv.classList.remove('show');if(idx<TOTAL-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});setTimeout(()=>{const newQ=getUnansweredQ(idx+1);if(newQ)showQuiz(idx+1);},400);}else{doneBanner.classList.add('show');markDone();}},700);}},250);}
function next(){const pageNum=idx+1;const uq=getUnansweredQ(pageNum);if(uq){showQuiz(pageNum);return;}if(idx<TOTAL-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});}else{doneBanner.classList.add('show');markDone();}}
function prev(){if(idx>0){idx--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goto(i){if(i>idx){for(let p=idx+1;p<=i;p++){const uq=getUnansweredQ(p);if(uq){idx=p-1;render();setTimeout(()=>showQuiz(p),300);return;}}}idx=Math.max(0,Math.min(TOTAL-1,i));render();}
function markDone(){try{const key=(()=>{try{const u=JSON.parse(localStorage.getItem("lwwf_auth_user")||"null");if(u&&u.class&&u.number)return`progress_ch${CHAPTER}_${u.class}_${u.number}`;}catch(e){}return`progress_ch${CHAPTER}`;})();const p=JSON.parse(localStorage.getItem(key)||'{}');p[DECK_KEY]={done:true,ts:Date.now()};localStorage.setItem(key,JSON.stringify(p));}catch(e){}}
document.addEventListener('keydown',e=>{if(lockModal.classList.contains('show'))return;if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}else if(e.key==='ArrowLeft'){e.preventDefault();prev();}});
let touchX=0,touchY=0;
document.querySelector('.viewer').addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX;touchY=e.changedTouches[0].screenY;},{passive:true});
document.querySelector('.viewer').addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-touchX,dy=e.changedTouches[0].screenY-touchY;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0)next();else prev();}},{passive:true});

// ===== TTS Lecture System (廣東話自動講解 — opt-in 版本 2026-05-05) =====
// 用戶反映：自動播放擾人 + 兩把聲音重複。Fix：
// 1. 預設 OFF（學生 opt-in）
// 2. 嚴格 cancel previous utterance（避免重複）
// 3. 每頁有「🔊 廣東話講解」button 學生可手動 trigger
let __ttsEnabled = false;  // OFF by default
let __ttsCurrentUtter = null;
function __ttsCancel() {
  if (window.speechSynthesis) {
    try { speechSynthesis.cancel(); } catch(e) {}
  }
  __ttsCurrentUtter = null;
}
function speakPage(pageNum) {
  // ALWAYS cancel previous (avoid duplicate voices) — even if user disabled, ensure clean state
  __ttsCancel();
  if (!__ttsEnabled || !window.speechSynthesis) return;
  const text = (typeof PAGE_NARRATION !== 'undefined' && PAGE_NARRATION[pageNum]) || '';
  if (!text) return;
  // Wait briefly for cancel to take effect (avoid overlap)
  setTimeout(() => {
    if (!__ttsEnabled) return;  // double-check (user may have disabled during wait)
    const u = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();
    const yueVoice = voices.find(v => v.lang === 'yue-HK' || v.lang === 'zh-HK')
                  || voices.find(v => v.lang.startsWith('zh-')) || null;
    if (yueVoice) u.voice = yueVoice;
    u.lang = 'zh-HK';
    u.rate = 1.0;
    u.pitch = 1.0;
    __ttsCurrentUtter = u;
    speechSynthesis.speak(u);
  }, 80);
}
function toggleTTS() {
  __ttsEnabled = !__ttsEnabled;
  const btn = document.getElementById('ttsToggleBtn');
  if (btn) {
    btn.textContent = __ttsEnabled ? '🔊 自動講解：開' : '🔇 自動講解：關';
    btn.style.background = __ttsEnabled ? 'linear-gradient(135deg,#FFB300,#FF8F00)' : 'white';
    btn.style.color = __ttsEnabled ? 'white' : '#FF8F00';
  }
  if (!__ttsEnabled) __ttsCancel();
  else { try { speakPage(parseInt(document.getElementById('ind')?.textContent) || 1); } catch(e) {} }
}
function speakCurrentPage() {
  // Manual one-time trigger (學生 click 即時聽 1 次)
  __ttsCancel();
  const wasEnabled = __ttsEnabled;
  __ttsEnabled = true;
  setTimeout(() => speakPage(parseInt(document.getElementById('ind')?.textContent) || 1), 50);
  __ttsEnabled = wasEnabled;  // 還原 user 設定
}
