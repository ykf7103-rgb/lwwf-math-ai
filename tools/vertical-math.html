<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>直式乘法輸入工具 · 第13課</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 14px 14px 40px;
    font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #FFFEF7 0%, #FFF8DC 50%, #FFF0E0 100%);
    min-height: 100vh; color: #222;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { color: #E65100; font-size: 1.3rem; text-align: center; margin: 4px 0 6px; }
  .sub { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 14px; line-height: 1.5; }

  /* Level picker */
  .levels {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .level-btn {
    padding: 10px 6px; border: 2px solid #FFB74D; background: white;
    border-radius: 10px; font-weight: 800; cursor: pointer;
    color: #E65100; font-size: 0.85rem; font-family: inherit;
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .level-btn:hover { background: #FFF3E0; }
  .level-btn.active { background: linear-gradient(135deg,#FF9800,#E65100); color: white; border-color: #E65100; box-shadow: 0 3px 10px rgba(230,81,0,0.3); }
  .level-btn small { font-size: 0.7rem; font-weight: 600; opacity: 0.85; }

  /* Main card */
  .card {
    background: white; border-radius: 18px; padding: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border: 2px solid #FFE0B2;
  }
  .problem {
    text-align: center; font-size: 1.1rem; font-weight: 800;
    color: #333; margin-bottom: 10px;
  }
  .problem .eq { color: #E65100; }

  /* Vertical tableau — grid-based alignment */
  .tableau {
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 12px;
    background: linear-gradient(180deg,#FFF8E1,#FFF3E0);
    border-radius: 12px; margin: 10px 0 18px;
    overflow-x: auto;
    font-family: 'SF Mono','Menlo','Consolas',monospace;
  }
  .trow {
    display: grid;
    /* 每行 = [op column 36px] + [N 個 slot]
       slot 寬度會由 JS set CSS var --slot-count */
    grid-template-columns: 36px repeat(var(--slot-count), 44px);
    gap: 4px;
    align-items: center;
    margin-bottom: 2px;
  }
  .trow .op {
    font-size: 1.7rem; font-weight: 800; color: #E65100;
    text-align: right; padding-right: 2px;
  }
  .trow.hr {
    grid-template-columns: 36px 1fr;
    border: none; height: 4px; margin: 2px 0 4px;
    width: calc(36px + var(--slot-count) * 44px + var(--slot-count) * 4px);
    position: relative;
  }
  .trow.hr::before {
    content: ''; position: absolute;
    left: 36px; right: 0; top: 50%;
    height: 3px; background: #333;
  }
  /* Each column slot is fixed 44px — digits AND dots use same slot width for perfect alignment */
  .slot {
    width: 44px; height: 52px;
    display: flex; align-items: center; justify-content: center;
  }
  .slot.empty-slot { /* blank placeholder — no visual */ }
  .slot.dot-slot {
    font-size: 2rem; font-weight: 900; color: #E65100;
    line-height: 1;
  }
  .cell {
    width: 44px; height: 52px;
    border: 2px solid #FFB74D; border-radius: 8px;
    background: white; display: flex; align-items: center; justify-content: center;
    font-size: 1.55rem; font-weight: 800; color: #333;
    cursor: pointer; user-select: none;
    transition: all 0.12s;
    position: relative;
  }
  .cell:hover:not(.locked):not(.correct) { background: #FFF3E0; transform: translateY(-1px); }
  .cell.active {
    border-color: #E65100; background: #FFE0B2;
    box-shadow: 0 0 0 3px rgba(255,152,0,0.3);
  }
  .cell.correct {
    background: #C8E6C9; border-color: #4CAF50; color: #2E7D32;
    cursor: default;
  }
  .cell.wrong {
    background: #FFCDD2; border-color: #F44336; color: #C62828;
    animation: shake 0.3s;
  }
  .cell.locked {
    background: #F5F5F5; border-color: #E0E0E0; color: #999;
    cursor: default;
  }
  .cell .dot {
    position: absolute; bottom: 2px; right: 4px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #E65100;
  }
  .cell.empty { color: #bbb; }
  .cell.empty::before {
    content: '?'; opacity: 0.5;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* Digit keypad */
  .keypad-title { text-align: center; font-size: 0.85rem; color: #666; margin: 4px 0 6px; }
  .keypad {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    max-width: 320px; margin: 0 auto 14px;
  }
  .key {
    padding: 14px 0; border: 2px solid #FF9800; background: white;
    border-radius: 10px; font-size: 1.2rem; font-weight: 800;
    color: #E65100; cursor: pointer; font-family: inherit;
    transition: all 0.1s;
  }
  .key:hover { background: #FFF3E0; }
  .key:active { transform: scale(0.95); }
  .key.dot { background: linear-gradient(135deg,#FFE0B2,#FFCC80); }
  .key.clear { background: linear-gradient(135deg,#FFEBEE,#FFCDD2); border-color: #E57373; color: #C62828; }

  /* Status + buttons */
  .status {
    padding: 10px 14px; border-radius: 10px; margin: 10px 0;
    text-align: center; font-weight: 700; font-size: 0.95rem;
    min-height: 1.5em; line-height: 1.5;
  }
  .status.info { background: #E3F2FD; color: #1565C0; border: 1.5px solid #90CAF9; }
  .status.ok { background: #E8F5E9; color: #2E7D32; border: 1.5px solid #81C784; animation: pop 0.3s; }
  .status.err { background: #FFEBEE; color: #C62828; border: 1.5px solid #E57373; }
  @keyframes pop { 0% { transform: scale(0.9); } 60% { transform: scale(1.06); } 100% { transform: scale(1); } }

  .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
  .btn {
    padding: 10px 20px; border-radius: 10px; border: 2px solid;
    font-weight: 800; cursor: pointer; font-size: 0.95rem;
    font-family: inherit; transition: all 0.15s;
  }
  .btn.primary { background: linear-gradient(135deg,#4CAF50,#2E7D32); color: white; border-color: #2E7D32; }
  .btn.primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(46,125,50,0.4); }
  .btn.secondary { background: white; color: #1565C0; border-color: #1565C0; }
  .btn.secondary:hover { background: #E3F2FD; }
  .btn.hint { background: white; color: #F57C00; border-color: #F57C00; }
  .btn.hint:hover { background: #FFF3E0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .progress {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 0.88rem; color: #555;
  }
  .streak { color: #E65100; font-weight: 800; }

  .hint-box {
    margin-top: 10px; padding: 10px 14px;
    background: #FFF8E1; border-left: 4px solid #FFC107;
    border-radius: 8px; font-size: 0.88rem; color: #555; line-height: 1.6;
    display: none;
  }
  .hint-box.show { display: block; }
  .hint-box b { color: #E65100; }

  @media (max-width: 500px) {
    .cell { width: 36px; height: 44px; font-size: 1.3rem; }
    .slot { width: 36px; height: 44px; }
    .trow { grid-template-columns: 28px repeat(var(--slot-count), 36px); gap: 3px; }
    .trow.hr { width: calc(28px + var(--slot-count) * 36px + var(--slot-count) * 3px); }
    .trow .op { font-size: 1.3rem; }
    .slot.dot-slot { font-size: 1.6rem; }
    .key { padding: 12px 0; font-size: 1.05rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔢 直式乘法輸入工具</h1>
  <p class="sub">選擇一個關卡，然後按格仔 → 再按數字鍵輸入。全部答啱先過關！</p>

  <!-- Level picker -->
  <div class="levels" id="levels"></div>

  <!-- Main card -->
  <div class="card">
    <div class="progress">
      <span>🎯 第 <b id="qIdx">1</b> / <b id="qTotal">3</b> 題</span>
      <span class="streak" id="streakLabel">🔥 連對 0</span>
    </div>

    <div class="problem" id="problem"></div>

    <div class="tableau" id="tableau"></div>

    <div class="keypad-title">👇 按下面數字鍵輸入</div>
    <div class="keypad" id="keypad">
      <button class="key" onclick="input(1)">1</button>
      <button class="key" onclick="input(2)">2</button>
      <button class="key" onclick="input(3)">3</button>
      <button class="key" onclick="input(4)">4</button>
      <button class="key" onclick="input(5)">5</button>
      <button class="key" onclick="input(6)">6</button>
      <button class="key" onclick="input(7)">7</button>
      <button class="key" onclick="input(8)">8</button>
      <button class="key" onclick="input(9)">9</button>
      <button class="key" onclick="input(0)">0</button>
      <button class="key dot" onclick="inputDot()" title="小數點">·</button>
      <button class="key clear" onclick="clearCell()" style="grid-column:span 2;">✕ 清除</button>
      <button class="key" onclick="checkAll()" style="background:linear-gradient(135deg,#81C784,#2E7D32);color:white;border-color:#2E7D32;grid-column:span 2;">✅ 檢查</button>
    </div>

    <div class="status info" id="status">👉 先按任何一格空白，然後用下方鍵盤輸入數字</div>

    <div class="controls">
      <button class="btn hint" onclick="showHint()">💡 提示</button>
      <button class="btn secondary" onclick="resetProblem()">🔄 重做</button>
      <button class="btn primary" id="nextBtn" onclick="nextProblem()" disabled>下一題 ▶</button>
    </div>

    <div class="hint-box" id="hintBox"></div>
  </div>
</div>

<script>
// ===== Problem sets =====
// Ch13 covers: 一位小數×整數, 兩位小數×整數, 小數×小數
// Each problem: top (multiplicand), bot (multiplier), pp[] (partial products), ans (final)
// Using integers in tableau, then decimal point is applied after — this is how vertical multiplication is taught.
const LEVELS = {
  beginner: {
    name: '🌱 初級',
    desc: '一位小數 × 個位整數',
    problems: [
      // 0.3 × 4 = 1.2  → 3 × 4 = 12, 1 decimal
      { top: '0.3', bot: '4', ppList: ['12'], ans: '1.2', hint: '3×4=12，因為被乘數小數點後有 1 位，答案都有 1 位 → 1.2' },
      { top: '0.6', bot: '5', ppList: ['30'], ans: '3.0', hint: '6×5=30，小數點後 1 位 → 3.0（或 3）' },
      { top: '0.7', bot: '8', ppList: ['56'], ans: '5.6', hint: '7×8=56，小數點後 1 位 → 5.6' },
    ],
  },
  mid: {
    name: '🌿 中級',
    desc: '兩位小數 × 個位',
    problems: [
      // 0.23 × 4 = 0.92
      { top: '0.23', bot: '4', ppList: ['92'], ans: '0.92', hint: '23×4=92，小數點後 2 位 → 0.92' },
      { top: '1.25', bot: '3', ppList: ['375'], ans: '3.75', hint: '125×3=375，小數點後 2 位 → 3.75' },
      { top: '2.15', bot: '6', ppList: ['1290'], ans: '12.9', hint: '215×6=1290，小數點後 2 位 → 12.90（= 12.9）' },
    ],
  },
  advanced: {
    name: '🌳 高級',
    desc: '小數 × 小數',
    problems: [
      // 0.3 × 0.4 = 0.12
      { top: '0.3', bot: '0.4', ppList: ['12'], ans: '0.12', hint: '3×4=12，兩邊小數點後共 2 位 → 0.12' },
      { top: '1.2', bot: '0.5', ppList: ['60'], ans: '0.60', hint: '12×5=60，小數點後共 2 位 → 0.60（= 0.6）' },
      { top: '2.3', bot: '1.4', ppList: ['92','230'], ans: '3.22', hint: '23×14=322，小數點後共 2 位 → 3.22。（部分積：23×4=92、23×10=230）' },
    ],
  },
  expert: {
    name: '🏆 超難',
    desc: '兩位 × 兩位',
    problems: [
      { top: '0.23', bot: '0.14', ppList: ['92','230'], ans: '0.0322', hint: '23×14=322，共 4 位小數 → 0.0322' },
      { top: '1.25', bot: '0.36', ppList: ['750','3750'], ans: '0.4500', hint: '125×36=4500，共 4 位小數 → 0.4500（= 0.45）' },
      { top: '2.08', bot: '1.25', ppList: ['1040','4160','2080'], ans: '2.6000', hint: '208×125=26000，共 4 位小數 → 2.6000（= 2.6）' },
    ],
  },
};

// ===== State =====
let currentLevel = 'beginner';
let problemIdx = 0;
let cells = [];         // array of cell objects: { el, correct:'5'|'.'|null, user:'', type:'pp'|'ans', locked:bool, hasDot:bool }
let activeCell = -1;
let streak = 0;

// ===== Build level buttons =====
const levelsWrap = document.getElementById('levels');
Object.entries(LEVELS).forEach(([key, lv]) => {
  const btn = document.createElement('button');
  btn.className = 'level-btn' + (key === currentLevel ? ' active' : '');
  btn.innerHTML = `<span>${lv.name}</span><small>${lv.desc}</small>`;
  btn.onclick = () => { currentLevel = key; problemIdx = 0; streak = 0; rebuild(); renderLevels(); };
  levelsWrap.appendChild(btn);
});
function renderLevels() {
  [...levelsWrap.children].forEach((b, i) => {
    const k = Object.keys(LEVELS)[i];
    b.classList.toggle('active', k === currentLevel);
  });
}

// ===== Build tableau for current problem (grid-based, perfect alignment) =====
function buildTableau() {
  const p = LEVELS[currentLevel].problems[problemIdx];
  const t = document.getElementById('tableau');
  t.innerHTML = '';
  cells = [];

  const topStr = p.top;       // "0.23"
  const botStr = p.bot;       // "4"
  const ansStr = p.ans;       // "0.92"

  // === Compute slot grid ===
  // Treat each character of top/bot/ans/pp as taking 1 slot. The answer's decimal
  // position determines how many slots the grid needs.
  //
  // Integer partial products (pp) and factors are right-aligned on a single "ones" anchor.
  // The answer's decimal position is anchored the same way as the factors (so slot positions
  // of digits match between top and ans).
  //
  // Approach: convert each row to an array of slot characters, right-aligned with a known
  // "ones position". Then pad left to fit the widest row.

  // Convert "0.23" → { chars: ['0','.','2','3'], decimalIdx: 1 (from right: 2 digits after dot) }
  function parseNum(s) {
    const dot = s.indexOf('.');
    const dpAfter = dot === -1 ? 0 : s.length - 1 - dot;  // digits after decimal
    return { chars: s.split(''), dpAfter };
  }

  const topP = parseNum(topStr);
  const botP = parseNum(botStr);
  const ansP = parseNum(ansStr);
  // Partial products are INTEGER strings, rendered WITHOUT decimal point in tableau
  const ppArr = p.ppList.map(pp => pp.split(''));

  // Each row is right-aligned using an "anchor position". The anchor is the ones place.
  // For top/bot/ans: ones position = (total chars) - (dpAfter) - 1 (index from left of last digit before dot)
  // We'll use a different strategy: each row has its "rightmost digit" aligned.
  // For answer, we show it separately below — so top/bot/pp all right-align ones digit together.
  // PP row i is shifted LEFT by i positions from the rightmost (pp[0] rightmost-aligned, pp[1] shifts left by 1, etc.)

  // Compute max row width in slots (excluding op col)
  const rowWidths = [
    topP.chars.length,
    botP.chars.length,
    ...ppArr.map((pp, i) => pp.length + i),  // ppi shifted left i
    ansP.chars.length,
  ];
  const slotCount = Math.max(...rowWidths);

  // Set the grid's slot count
  t.style.setProperty('--slot-count', slotCount);

  // Helpers
  function makeRow(opChar) {
    const row = document.createElement('div');
    row.className = 'trow';
    const op = document.createElement('span');
    op.className = 'op';
    op.textContent = opChar || '';
    row.appendChild(op);
    return row;
  }
  function addEmptySlot(row) {
    const s = document.createElement('div');
    s.className = 'slot empty-slot';
    row.appendChild(s);
    return s;
  }
  function addDotSlot(row) {
    const s = document.createElement('div');
    s.className = 'slot dot-slot';
    s.textContent = '·';
    row.appendChild(s);
    return s;
  }
  function addLockedDigit(row, d) {
    const s = document.createElement('div');
    s.className = 'slot';
    const c = document.createElement('div');
    c.className = 'cell locked';
    c.textContent = d;
    s.appendChild(c);
    row.appendChild(s);
    return s;
  }
  function addEditableDigit(row, correct, type) {
    const s = document.createElement('div');
    s.className = 'slot';
    const c = document.createElement('div');
    c.className = 'cell empty';
    const idx = cells.length;
    c.dataset.idx = idx;
    c.onclick = () => selectCell(idx);
    s.appendChild(c);
    row.appendChild(s);
    cells.push({ el: c, correct, user: '', type });
    return s;
  }
  function addEditableDot(row) {
    const s = document.createElement('div');
    s.className = 'slot';
    const c = document.createElement('div');
    c.className = 'cell empty';
    const idx = cells.length;
    c.dataset.idx = idx;
    c.onclick = () => selectCell(idx);
    s.appendChild(c);
    row.appendChild(s);
    cells.push({ el: c, correct: '.', user: '', type: 'ans', isDot: true });
    return s;
  }

  // --- 1. Top row (locked) — right-aligned ---
  const r1 = makeRow('');
  const topPad = slotCount - topP.chars.length;
  for (let i = 0; i < topPad; i++) addEmptySlot(r1);
  topP.chars.forEach(ch => {
    if (ch === '.') addDotSlot(r1);
    else addLockedDigit(r1, ch);
  });
  t.appendChild(r1);

  // --- 2. Bot row (locked × op) ---
  const r2 = makeRow('×');
  const botPad = slotCount - botP.chars.length;
  for (let i = 0; i < botPad; i++) addEmptySlot(r2);
  botP.chars.forEach(ch => {
    if (ch === '.') addDotSlot(r2);
    else addLockedDigit(r2, ch);
  });
  t.appendChild(r2);

  // --- 3. HR ---
  const hr1 = document.createElement('div');
  hr1.className = 'trow hr';
  t.appendChild(hr1);

  // --- 4. Partial products (editable integer digits) ---
  // pp[i] is shifted left by i positions
  ppArr.forEach((pp, i) => {
    const r = makeRow(i === 0 ? '' : '+');
    const leftPad = slotCount - pp.length - i;
    for (let p1 = 0; p1 < leftPad; p1++) addEmptySlot(r);
    pp.forEach(d => addEditableDigit(r, d, 'pp'));
    // right pad for shift
    for (let p2 = 0; p2 < i; p2++) addEmptySlot(r);
    t.appendChild(r);
  });

  // --- 5. Second HR if multi-PP ---
  if (ppArr.length > 1) {
    const hr2 = document.createElement('div');
    hr2.className = 'trow hr';
    t.appendChild(hr2);
  }

  // --- 6. Answer row (editable, "=" op) ---
  const rA = makeRow('=');
  const ansPad = slotCount - ansP.chars.length;
  for (let i = 0; i < ansPad; i++) addEmptySlot(rA);
  ansP.chars.forEach(ch => {
    if (ch === '.') addEditableDot(rA);
    else addEditableDigit(rA, ch, 'ans');
  });
  t.appendChild(rA);

  // Update problem line + progress
  document.getElementById('problem').innerHTML = `<span>${p.top}</span> <span style="color:#888;margin:0 6px;">×</span> <span>${p.bot}</span> <span class="eq">= ?</span>`;
  document.getElementById('qIdx').textContent = (problemIdx + 1);
  document.getElementById('qTotal').textContent = LEVELS[currentLevel].problems.length;
  document.getElementById('streakLabel').textContent = `🔥 連對 ${streak}`;

  activeCell = -1;
  // auto-select first empty cell
  if (cells.length) selectCell(0);
  setStatus('info', '👉 按任何一個空格，然後用下方鍵盤輸入數字。部分積要一步步填落去！');
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('nextBtn').disabled = true;
}

function selectCell(idx) {
  const c = cells[idx];
  if (!c || c.el.classList.contains('correct')) return;
  if (activeCell >= 0 && cells[activeCell]) cells[activeCell].el.classList.remove('active');
  activeCell = idx;
  c.el.classList.add('active');
  c.el.classList.remove('wrong', 'empty');
}

function input(digit) {
  if (activeCell < 0) { setStatus('err', '⚠️ 先點一個格仔！'); return; }
  const c = cells[activeCell];
  if (c.el.classList.contains('correct')) return;
  if (c.isDot) { setStatus('err', '⚠️ 呢格要小數點「·」，唔係數字。'); c.el.classList.add('wrong'); setTimeout(()=>c.el.classList.remove('wrong'), 400); return; }
  c.user = String(digit);
  c.el.textContent = String(digit);
  c.el.classList.remove('empty', 'wrong');
  // auto-check this cell
  if (c.user === c.correct) {
    c.el.classList.add('correct');
    c.el.classList.remove('active');
    // auto advance to next empty cell
    const next = findNextEmpty(activeCell);
    activeCell = -1;
    if (next >= 0) selectCell(next);
    else checkAll();
  } else {
    c.el.classList.add('wrong');
    setStatus('err', `❌ ${digit} 唔啱。再試或者按「💡 提示」睇步驟。`);
  }
}

function inputDot() {
  if (activeCell < 0) { setStatus('err', '⚠️ 先點一個格仔！'); return; }
  const c = cells[activeCell];
  if (c.el.classList.contains('correct')) return;
  if (!c.isDot) {
    c.el.classList.add('wrong');
    setTimeout(()=>c.el.classList.remove('wrong'), 400);
    setStatus('err', '❌ 呢格唔係小數點位置。諗下：兩邊總共有幾多位小數？');
    return;
  }
  c.user = '.';
  c.el.textContent = '.';
  c.el.classList.remove('empty', 'wrong');
  c.el.classList.add('correct');
  c.el.classList.remove('active');
  const next = findNextEmpty(activeCell);
  activeCell = -1;
  if (next >= 0) selectCell(next);
  else checkAll();
}

function clearCell() {
  if (activeCell < 0) return;
  const c = cells[activeCell];
  if (c.el.classList.contains('correct')) return;
  c.user = '';
  c.el.textContent = '';
  c.el.classList.add('empty');
  c.el.classList.remove('wrong');
}

function findNextEmpty(from) {
  for (let i = from + 1; i < cells.length; i++) {
    if (!cells[i].el.classList.contains('correct')) return i;
  }
  // wrap around
  for (let i = 0; i < from; i++) {
    if (!cells[i].el.classList.contains('correct')) return i;
  }
  return -1;
}

function checkAll() {
  let allCorrect = true;
  cells.forEach(c => {
    if (!c.el.classList.contains('correct')) allCorrect = false;
  });
  if (allCorrect) {
    streak++;
    setStatus('ok', `🎉 全部答啱！連對 ${streak} 題。`);
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('streakLabel').textContent = `🔥 連對 ${streak}`;
  } else {
    const remaining = cells.filter(c => !c.el.classList.contains('correct')).length;
    setStatus('err', `仲有 ${remaining} 格要填。繼續加油！`);
  }
}

function showHint() {
  const p = LEVELS[currentLevel].problems[problemIdx];
  const box = document.getElementById('hintBox');
  box.innerHTML = `💡 <b>提示</b>：${p.hint}`;
  box.classList.add('show');
}

function resetProblem() {
  streak = 0;
  buildTableau();
}

function nextProblem() {
  problemIdx++;
  if (problemIdx >= LEVELS[currentLevel].problems.length) {
    // finished this level
    document.getElementById('problem').innerHTML = `🎊 <span style="color:#2E7D32;">全部 ${LEVELS[currentLevel].problems.length} 題都做完！</span> 連對 ${streak} 題！`;
    document.getElementById('tableau').innerHTML = `<div style="text-align:center;padding:20px;font-size:1.1rem;">
      <div style="font-size:3rem;">🏆</div>
      <div style="font-weight:800;color:#E65100;margin:8px 0;">關卡完成！</div>
      <div style="color:#666;">揀其他難度繼續練，或者按「🔄 重做」再試一次。</div>
    </div>`;
    document.getElementById('status').innerHTML = '🎉 恭喜完成！';
    document.getElementById('status').className = 'status ok';
    document.getElementById('nextBtn').disabled = true;
    return;
  }
  buildTableau();
}

function rebuild() { problemIdx = 0; streak = 0; buildTableau(); }

function setStatus(cls, msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + cls;
}

// Keyboard shortcut: allow typing directly
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key >= '0' && e.key <= '9') input(parseInt(e.key));
  else if (e.key === '.' || e.key === '·') inputDot();
  else if (e.key === 'Backspace' || e.key === 'Delete') clearCell();
  else if (e.key === 'Enter') checkAll();
  else if (e.key === 'Tab') { e.preventDefault(); const next = findNextEmpty(activeCell < 0 ? -1 : activeCell); if (next >= 0) selectCell(next); }
});

// Init
buildTableau();
</script>
</body>
