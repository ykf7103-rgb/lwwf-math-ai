<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body>
<iframe id="f" src="http://localhost:8080/assets/ch12/game1.html" style="width:100%;height:90vh;border:0"></iframe>
<div id="out" style="padding:10px;background:#ffeeaa"></div>
<script>
document.getElementById('f').addEventListener('load', () => {
  setTimeout(() => {
    const w = document.getElementById('f').contentWindow;
    const d = w.document;
    try { w.startGame(); } catch(e) { document.getElementById('out').textContent = 'startGame error: ' + e.message; return; }
    setTimeout(() => {
      const report = {
        hasQUESTIONS: typeof w.QUESTIONS !== 'undefined',
        questionsCount: w.QUESTIONS ? w.QUESTIONS.length : 0,
        firstQ: w.QUESTIONS ? JSON.stringify(w.QUESTIONS[0]).slice(0,200) : 'none',
        qTextInnerHTML: d.getElementById('qText')?.innerHTML,
        qCategoryText: d.getElementById('qCategory')?.textContent,
        answersGridHTML: d.getElementById('answersGrid')?.innerHTML,
        state: JSON.stringify(w.state || {}),
      };
      document.getElementById('out').innerText = JSON.stringify(report, null, 2);
    }, 2000);
  }, 500);
});
</script>
</body></html>
